<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Silsilah Keluarga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"> -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    :root { --dark-blue: #1A365D; --light-blue: #63B3ED; --light-gray: #EDF2F7; } 
    body { background-color: var(--light-gray); font-family: 'Segoe UI', sans-serif; }
    .navbar { background-color: var(--dark-blue) !important; }
    .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
  
    /* Tampilan  Foto Pada Tabel Data Kelauarga */
    .foto-thumb { 
      width: 50px; 
      height: 50px; 
      object-fit: cover; 
      border-radius: 50%; 
      border: 2px solid var(--light-blue); 
    }
    
    /* Tombol bulat dengan icon pada Tabel Data Keluarga : View, Edit dan Hapus */
    .btn-round { 
        width: 36px !important;
        height: 36px !important;
        border-radius: 50% !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 0 !important;
        margin: 0 2px !important;
        border: none !important;
        transition: all 0.2s ease-in-out !important;
        cursor: pointer !important;
    }
    .btn-round i { font-size: 16px !important; margin: 0 !important; padding: 0 !important; }
    .btn-round:hover { background-color: #3d3d3d !important; transform: scale(1.05); }
    /* Warna khusus untuk masing-masing tombol */
    .btn-round.btn-info:hover { background-color: #0dcaf0 !important; color: white !important; }
    .btn-round.btn-info { background-color: white !important; color: #0dcaf0 !important; }
    .btn-round.btn-warning:hover { background-color: #ffc107 !important; color: white !important; }
    .btn-round.btn-warning { background-color: white !important; color: #ffc107 !important; }
    .btn-round.btn-danger:hover { background-color: #dc3545 !important; color: white !important; }
    .btn-round.btn-danger { background-color: white !important; color: #dc3545 !important; }

    /* Tampilan Foto Untuk Detail Data Keluarga */
    .view-photo { 
      width: 150px; 
      height: 150px; 
      object-fit: cover; 
      border-radius: 8px; 
      border: 3px solid var(--light-blue);
    }

    /* Header biru terang untuk semua panel/modal */
    .card-header, .modal-header {
        background-color: #007bff !important;
        color: white !important;
    }
    /* Membuat tombol close jadi putih */
    .modal-header .btn-close { filter: brightness(0) invert(1); }
    /* Override untuk memastikan modal tampil */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1055;
    }
    .modal.show { display: block !important; }
    .modal-backdrop { z-index: 1050; }

    /* Styling Pesan (Alert Custom) */
    .form-msg {
        display: none;
        padding: 10px 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .msg-success { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .msg-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .msg-warning { background-color: #fff3cd; color: #fdbf04; border: 1px solid #ffecb5; }
    .msg-info { background-color: #cff4fc; color: #055160; border: 1px solid #b6effb; }

    /* Avatar bulat untuk inisial */
    .avatar-circle {
        width: 50px;
        height: 50px;
        background-color: #416eff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 18px;
        margin: 0 auto;
    }
    .avatar-circle-sm { width: 40px; height: 40px; font-size: 14px; }
    .avatar-circle-lg { width: 150px; height: 150px; font-size: 48px; margin-bottom: 10px; }
    /* Ganti style foto-thumb */
    .foto-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 50%; border: 2px solid #023a7a; }

    /* Styling untuk diagram pohon */
  /* Styling untuk diagram pohon keluarga - versi minimalis */
.tree-diagram {
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
    background: transparent;
    overflow-x: auto;
}

.tree-root {
    list-style: none;
    padding-left: 0;
    margin: 0;
    display: flex;
    justify-content: center;
}

.tree-children {
    list-style: none;
    padding-left: 0;
    margin: 0;
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    position: relative;
}

.tree-diagram li {
    list-style: none;
    text-align: center;
    position: relative;
    padding: 0 10px;
}

/* Garis penghubung vertikal dari parent ke children */
.tree-children {
    position: relative;
    margin-top: 20px;
    padding-top: 20px;
}

.tree-children::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 20px;
    background: #aaa;
}

.tree-children li {
    position: relative;
}

.tree-children li::before {
    content: '';
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 20px;
    background: #aaa;
}

/* Node diagram - tanpa kotak background */
.diagram-node {
    text-align: center;
    margin: 8px;
    transition: transform 0.2s;
}

.diagram-node:hover {
    transform: translateY(-3px);
}

/* Foto/avatar diagram */
.diagram-foto {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 50%;
    border: 2px solid #1A365D;
    margin-bottom: 5px;
    background: white;
}

.diagram-avatar {
    width: 60px;
    height: 60px;
    background-color: #1A365D;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 20px;
    margin: 0 auto 5px auto;
    border: 2px solid #1A365D;
}

.diagram-name {
    font-size: 12px;
    font-weight: 600;
    color: #333;
    margin-bottom: 2px;
    word-break: break-word;
    max-width: 100px;
}

.diagram-year {
    font-size: 10px;
    color: #666;
    font-weight: normal;
}

/* Pasangan (spouse) ditampilkan bersebelahan */
.spouse-container {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
}

.spouse-container .diagram-node {
    margin: 5px;
}

.spouse-connector {
    font-size: 14px;
    color: #999;
    margin: 0 2px;
}

/* Container untuk keluarga (orang tua + anak-anak) */
.family-group {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.parents-container {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
}

.children-container {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    position: relative;
    padding-top: 15px;
}

.children-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 15px;
    background: #aaa;
}

/* Responsif */
@media (max-width: 768px) {
    .diagram-foto, .diagram-avatar {
        width: 45px;
        height: 45px;
        font-size: 16px;
    }
    .diagram-name {
        font-size: 10px;
    }
    .diagram-year {
        font-size: 8px;
    }
    .tree-children {
        gap: 15px;
    }
}  
  
  </style>
</head>

          crossorigin="anonymous" referrerpolicy="no-referrer">

  <script>
    // *************************      
    // DEKLARASI VARIABEL GLOBAL
    // **************************
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNkJGOxmUZBqfP94UToBvaK0P9BvbfukfW-oUj_vKAYICLpoj86TG4Dch1BPEzaqbP/exec";
    let globalData = [];
    let modalInstance;
    let confirmModalInstance;
    
    document.addEventListener('DOMContentLoaded', function() {
        // Daftarkan modal utama
        const elForm = document.getElementById('formModal');
        if (elForm) modalInstance = new bootstrap.Modal(elForm);
        
        // Daftarkan modal konfirmasi
        const elConfirm = document.getElementById('confirmModal');
        if (elConfirm) confirmModalInstance = new bootstrap.Modal(elConfirm);
        
        // HAPUS pendaftaran viewModalInstance - tidak perlu
        
        // Registrasi Event Submit Form
        const fLogin = document.getElementById('formLogin');
        if (fLogin) fLogin.onsubmit = prosesLogin;
        
        const fKeluarga = document.getElementById('formKeluarga');
        if (fKeluarga) fKeluarga.onsubmit = simpanData;

        // Event untuk diagram
        const btnBuatDiagram   = document.getElementById('btnBuatDiagram');
        const btnDownloadPdf   = document.getElementById('btnDownloadPdf');
        const btnDownloadExcel = document.getElementById('btnDownloadExcel');
        if (btnBuatDiagram) btnBuatDiagram.onclick = generateDiagram;
        if (btnDownloadPdf) btnDownloadPdf.onclick = downloadDiagramPDF;
        if (btnDownloadExcel) btnDownloadExcel.onclick = downloadDiagramExcel;
    });

     /***********************
     * Tampilan showloader 
     ***********************/
    function showLoader(show, text = "Memproses...") {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
      document.getElementById('loaderText').innerText = text;
    }

    /*******************************
     * Fungsi untuk login aplikasi
     * *****************************/
    async function prosesLogin(e) {
    e.preventDefault();
    const user = document.getElementById('loginUsername').value;
    const pass = document.getElementById('loginPassword').value;
    const btn = e.target.querySelector('button[type="submit"]');
    
    // Spinner hanya pada tombol (Point 1)
    const textAsli = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';

    try {
      const resp = await fetch(`${SCRIPT_URL}?action=login&u=${user}&p=${pass}`);
      const res = await resp.json();
        if (res.success) {
            document.getElementById('loginArea').classList.add('d-none');
            document.getElementById('appArea').classList.remove('d-none');
            loadData();
        } else {
            //alert(res.message);
            showMessage(res.message, "error");
        }
      } catch (err) {
          //alert("Gagal terhubung ke server");
          showMessage("Gagal terhubung ke serrver : " + err.message, "error");
      } finally {
          btn.disabled = false;
          btn.innerHTML = textAsli;
      }
    }

    /****************************
     * Buat Tabel Data Keluarga
     * **************************/
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (!tbody) return;
      tbody.innerHTML = '';
      
      if (!globalData || globalData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Data tidak ditemukan atau kosong.</td></tr>';
        return;
      }

      globalData.forEach(item => {
        const img = (item.foto && item.foto.includes('http')) ? item.foto : '[https://via.placeholder.com/50?text=No+Foto](https://via.placeholder.com/50?text=No+Foto)';
        
        tbody.innerHTML += `
          <tr>
            <td><img src="${img}" class="foto-thumb" onerror="this.src='[https://via.placeholder.com/50](https://via.placeholder.com/50)'"></td>
            <td><strong>${item.nama || '-'}</strong></td>
            <td>${item.statusKawin || '-'}</td>
            <td>${item.namaPasangan || '-'}</td>
            <td>${item.statusKeluarga || '-'}</td>
            <td>${item.ayah || '-'}</td>
            <td>${item.ibu || '-'}</td>
            <td class="text-center">
              <div class="d-flex justify-content-center gap-1">
                <button type="button" class="btn btn-info text-white btn-round" onclick="viewDetail('${itemId}')"><i class="fas fa-eye"></i></button>
                <button type="button" class="btn btn-warning text-white btn-round" onclick="openForm('edit', '${itemId}')"><i class="fas fa-pencil"></i></button>
                <button type="button" class="btn btn-danger text-white btn-round" onclick="hapusData('${itemId}', '${itemNama}')"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>`;
      });
    }
 
    /***************************************
     * Untuk tampilkan form Tambah dan Edit
     ***************************************/
    function openForm(mode, id = null) {
    const form = document.getElementById('formKeluarga');
    if (form) form.reset();
    
    document.getElementById('formId').value = "";
    document.getElementById('formMessage').style.display = 'none';
    
    // Reset Tombol Simpan agar tidak disabled (Fix Hang)
    const btn = document.getElementById('btnSimpan');
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = 'Simpan Data';
    }

    // Update Judul Modal (Fix Point 2.2 menggunakan id="modalTitle")
    const titleEl = document.getElementById('modalTitle');
    if (titleEl) {
        titleEl.innerText = (mode === 'edit') ? "Edit Data Keluarga" : "Tambah Data Keluarga";
    }

    if (mode === 'edit' && id) {
        const item = globalData.find(x => x.id == id);
        if (item) {
            document.getElementById('formId').value = item.id;
            document.getElementById('nama').value = item.nama || "";
            document.getElementById('jk').value = item.jk || "Pria";
            document.getElementById('tglLahir').value = item.tglLahir ? new Date(item.tglLahir).toISOString().split('T')[0] : "";
            document.getElementById('statusKawin').value = item.statusKawin || "Lajang";
            document.getElementById('namaPasangan').value = item.namaPasangan || "";
            document.getElementById('statusKeluarga').value = item.statusKeluarga || "Anak";
            document.getElementById('alamat').value = item.alamat || "";
            document.getElementById('kota').value = item.kota || "";
            document.getElementById('ayah').value = item.ayah || "";
            document.getElementById('ibu').value = item.ibu || "";

    /********************************************* 
    * Fungsi untuk mendapatkan inisial dari nama
    **********************************************/
    function getInitials(nama) {
        if (!nama || nama === '-' || nama === '') return '?';
        const parts = nama.trim().split(' ');
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    // Membangun struktur tree berdasarkan Nama Ayah (case insensitive)
    function buildFamilyTreeByAyah(ayahName) {
        if (!ayahName) return null;
        
        // Case insensitive search
        const normalizeStr = (str) => (str || '').toLowerCase().trim();
        const normalizedAyahName = normalizeStr(ayahName);
        
        // Cari data ayah (case insensitive)
        const ayahData = globalData.find(item => normalizeStr(item.nama) === normalizedAyahName);
        
        // Cari semua anggota yang memiliki ayah dengan nama tersebut (case insensitive)
        const familyMembers = globalData.filter(item => normalizeStr(item.ayah) === normalizedAyahName);
        
        if (!ayahData && familyMembers.length === 0) return null;
        
        // Buat node root (Ayah)
        const rootNode = {
            id: ayahData ? ayahData.id : 'root',
            nama: ayahName,
            jk: ayahData ? ayahData.jk : 'Pria',
            tglLahir: ayahData ? ayahData.tglLahir : '',
            foto: ayahData ? ayahData.foto : '',
            statusKeluarga: 'Kepala Keluarga',
            spouse: null,
            children: []
        };
        
        // Cari pasangan dari ayah (istri)
        if (ayahData && ayahData.namaPasangan && ayahData.namaPasangan.trim() !== '') {
            const spouseData = globalData.find(item => normalizeStr(item.nama) === normalizeStr(ayahData.namaPasangan));
            if (spouseData && spouseData.id !== rootNode.id) {
                rootNode.spouse = {
                    id: spouseData.id,
                    nama: spouseData.nama,
                    jk: spouseData.jk,
                    tglLahir: spouseData.tglLahir,
                    foto: spouseData.foto,
                    statusKeluarga: 'Istri'
                };
            }
        }
        
        // Proses setiap anak
        familyMembers.forEach(child => {
            if (normalizeStr(child.nama) !== normalizedAyahName) {
                const childNode = {
                    id: child.id,
                    nama: child.nama,
                    jk: child.jk,
                    tglLahir: child.tglLahir,
                    foto: child.foto,
                    statusKeluarga: child.statusKeluarga || 'Anak',
                    spouse: null,
                    children: []
                };
                
                // Cari pasangan dari anak (menantu)
                if (child.namaPasangan && child.namaPasangan.trim() !== '') {
                    const spouseData = globalData.find(item => normalizeStr(item.nama) === normalizeStr(child.namaPasangan));
                    if (spouseData && spouseData.id !== child.id) {
                        childNode.spouse = {
                            id: spouseData.id,
                            nama: spouseData.nama,
                            jk: spouseData.jk,
                            tglLahir: spouseData.tglLahir,
                            foto: spouseData.foto,
                            statusKeluarga: child.jk === 'Pria' ? 'Istri' : 'Suami'
                        };
                    }
                }
                
                // Cari cucu (anak dari anak) - case insensitive
                const grandchildren = globalData.filter(item => 
                    normalizeStr(item.ayah) === normalizeStr(child.nama) || 
                    normalizeStr(item.ibu) === normalizeStr(child.nama)
                );
                
                grandchildren.forEach(grandchild => {
                    if (normalizeStr(grandchild.nama) !== normalizeStr(child.nama)) {
                        const grandchildNode = {
                            id: grandchild.id,
                            nama: grandchild.nama,
                            jk: grandchild.jk,
                            tglLahir: grandchild.tglLahir,
                            foto: grandchild.foto,
                            statusKeluarga: 'Cucu',
                            spouse: null,
                            children: []
                        };
                        
                        // Cari pasangan cucu jika ada
                        if (grandchild.namaPasangan && grandchild.namaPasangan.trim() !== '') {
                            const grandSpouse = globalData.find(item => normalizeStr(item.nama) === normalizeStr(grandchild.namaPasangan));
                            if (grandSpouse && grandSpouse.id !== grandchild.id) {
                                grandchildNode.spouse = {
                                    id: grandSpouse.id,
                                    nama: grandSpouse.nama,
                                    jk: grandSpouse.jk,
                                    tglLahir: grandSpouse.tglLahir,
                                    foto: grandSpouse.foto,
                                    statusKeluarga: grandchild.jk === 'Pria' ? 'Istri' : 'Suami'
                                };
                            }
                        }
                        
                        childNode.children.push(grandchildNode);
                    }
                });
                
                rootNode.children.push(childNode);
            }
        });
        
        return rootNode;
    }

    // Render tree ke HTML dengan pasangan disamping
    function renderTreeDiagram(node, level = 0) {
        if (!node) return '';
        
        const birthYear = getBirthYear(node.tglLahir);
        const fotoHtml = getFotoForDiagram(node);
        
        // Node utama (suami/istri)
        let nodeHtml = `
            <div class="diagram-node">
                <div class="diagram-foto-wrapper">${fotoHtml}</div>
                <div class="diagram-name">${node.nama || '-'}</div>
                <div class="diagram-year">${birthYear}</div>
            </div>
        `;
        
        // Jika ada pasangan, tampilkan disamping
        if (node.spouse) {
            const spouseYear = getBirthYear(node.spouse.tglLahir);
            const spouseFotoHtml = node.spouse.foto && node.spouse.foto.includes('http') ? 
                `<img src="${node.spouse.foto}" class="diagram-foto" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'diagram-avatar\\'>${getInitials(node.spouse.nama)}</div>';">` :
                `<div class="diagram-avatar">${getInitials(node.spouse.nama)}</div>`;
            
            nodeHtml = `
                <div class="spouse-container">
                    ${nodeHtml}
                    <div class="spouse-connector">+</div>
                    <div class="diagram-node">
                        <div class="diagram-foto-wrapper">${spouseFotoHtml}</div>
                        <div class="diagram-name">${node.spouse.nama || '-'}</div>
                        <div class="diagram-year">${spouseYear}</div>
                    </div>
                </div>
            `;
        }
        
        // Jika ada anak-anak
        if (node.children && node.children.length > 0) {
            let childrenHtml = '';
            node.children.forEach(child => {
                childrenHtml += renderTreeDiagram(child, level + 1);
            });
            
            return `
                <li class="family-group">
                    ${nodeHtml}
                    <div class="children-container">
                        ${childrenHtml}
                    </div>
                </li>
            `;
        }
        
        return `<li>${nodeHtml}</li>`;
    }

    // Generate Diagram berdasarkan keluarga (case insensitive)
    function generateDiagram() {
        const selectElement = document.getElementById('pilihNamaDiagram');
        if (!selectElement) {
            showMessage("Error: Dropdown tidak ditemukan", "error", "tableMessage");
            return;
        }
        
        const selectedValue = selectElement.value;
        if (!selectedValue) {
            showMessage("Silakan pilih keluarga (Nama Ayah) terlebih dahulu!", "warning", "tableMessage");
            return;
        }
        
        showLoader(true, "Membuat diagram pohon...");
        
        try {
            // Cek apakah selection adalah Nama Ayah (case insensitive)
            const normalizeSelected = selectedValue.toLowerCase().trim();
            const isAyahName = globalData.some(item => 
                item.ayah && item.ayah.toLowerCase().trim() === normalizeSelected
            );
            
            let rootNode;
            
            if (isAyahName) {
                rootNode = buildFamilyTreeByAyah(selectedValue);
            } else {
                // Fallback: cari berdasarkan ID
                rootNode = buildFamilyTree(selectedValue);
            }
            
            const container = document.getElementById('diagramContainer');
            
            if (container) {
                if (rootNode) {
                    const treeHtml = `
                        <div class="tree-diagram">
                            <ul class="tree-root">
                                ${renderTreeDiagram(rootNode)}
                            </ul>
                        </div>
                    `;
                    container.innerHTML = treeHtml;
                    showMessage("Diagram berhasil dibuat", "success", "tableMessage");
                } else {
                    container.innerHTML = '<div class="text-center text-danger p-5">Tidak dapat membangun diagram pohon untuk keluarga yang dipilih</div>';
                }
            }
        } catch (error) {
            console.error("Error generateDiagram:", error);
            showMessage("Gagal membuat diagram: " + error.message, "error", "tableMessage");
        } finally {
            showLoader(false);
        }
    }

    // Download sebagai PDF
    function downloadDiagramPDF() {
        const container = document.getElementById('diagramContainer');
        if (!container || container.innerHTML.includes('Silakan pilih') || container.innerHTML.includes('Tidak dapat membangun')) {
            showMessage("Tidak ada diagram untuk diunduh. Buat diagram terlebih dahulu.", "warning", "tableMessage");
            return;
        }
        
        showLoader(true, "Menyiapkan PDF...");
        
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: 'family_tree.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, logging: false },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        
        html2pdf().set(opt).from(container).save().then(() => {
            showLoader(false);
            showMessage("PDF berhasil diunduh", "success", "tableMessage");
        }).catch(err => {
            console.error("PDF Error:", err);
            showLoader(false);
            showMessage("Gagal membuat PDF: " + err.message, "error", "tableMessage");
        });
    }

    // Download sebagai Excel
    function downloadDiagramExcel() {
        if (!globalData || globalData.length === 0) {
            showMessage("Tidak ada data untuk diekspor", "warning", "tableMessage");
            return;
        }
        
        showLoader(true, "Menyiapkan Excel...");
        
        try {
            const excelData = globalData.map(item => ({
                'ID': item.id,
                'Nama': item.nama,
                'Jenis Kelamin': item.jk,
                'Tanggal Lahir': item.tglLahir ? new Date(item.tglLahir).toLocaleDateString('id-ID') : '-',
                'Status Kawin': item.statusKawin,
                'Nama Pasangan': item.namaPasangan,
                'Status Keluarga': item.statusKeluarga,
                'Ayah': item.ayah,
                'Ibu': item.ibu,
                'Alamat': item.alamat,
                'Kota': item.kota
            }));
            
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data Keluarga");
            XLSX.writeFile(wb, "data_keluarga.xlsx");
            
            showLoader(false);
            showMessage("File Excel berhasil diunduh", "success", "tableMessage");
        } catch (error) {
            console.error("Excel Error:", error);
            showLoader(false);
            showMessage("Gagal membuat Excel: " + error.message, "error", "tableMessage");
        }
    }

    /***********************************
    * Fungsi Untuk logout dari aplikasi
    ************************************/
    function logout() { 
      location.reload();
    }

    /**************************************
    * Fungsi untuk Logika Kondisi Pasangan
    ***************************************/
    function togglePasangan() {
        const jk = document.getElementById('jk').value;
        const statusKawin = document.getElementById('statusKawin').value;
        const divPasangan = document.getElementById('divPasangan');
        const labelPasangan = document.getElementById('labelPasangan');
        let show = false;
        if (jk === "Pria") {
            if (statusKawin === "Kawin" || statusKawin === "Cerai") {
                labelPasangan.innerText = "Nama Istri";
                show = true;
            }
        } else if (jk === "Wanita") {
            if (statusKawin === "Kawin" || statusKawin === "Cerai") {
                labelPasangan.innerText = "Nama Suami";
                show = true;
            }
        }
        divPasangan.style.display = show ? "block" : "none";
        if (!show) document.getElementById('namaPasangan').value = "";
    }

    /*****************************************************************
     * Fungsi Pesan General
     * @param {string} msg - Teks pesan
     * @param {string} type - success, error, warning, info
     * @param {string} elementId - ID element tempat menampilkan pesan
     ******************************************************************/
    function showMessage(msg, type = 'info', elementId = 'formMessage') {
        const el = document.getElementById(elementId);
        if (!el) return;
        // Mapping Ikon
        const icons = {
            success: '✅',
            error: '❌',
            warning: '⚠️',
            info: 'ℹ️'
        };
        el.className = `form-msg msg-${type}`;
        el.innerHTML = `<span>${icons[type] || '•'}</span> <span>${msg}</span>`;
        el.style.display = 'flex';
        // Sembunyikan otomatis dalam 5 detik
        setTimeout(() => {
            el.style.display = 'none';
        }, 5000);
    }

   </script>
