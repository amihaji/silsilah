<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Silsilah Keluarga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"> -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    :root { --dark-blue: #1A365D; --light-blue: #63B3ED; --light-gray: #EDF2F7; } 
    body { background-color: var(--light-gray); font-family: 'Segoe UI', sans-serif; }
    .navbar { background-color: var(--dark-blue) !important; }
    .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
  
    /* Tampilan  Foto Pada Tabel Data Kelauarga */
    .foto-thumb { 
      width: 50px; 
      height: 50px; 
      object-fit: cover; 
      border-radius: 50%; 
      border: 2px solid var(--light-blue); 
    }
    
    /* Tombol bulat dengan icon pada Tabel Data Keluarga : View, Edit dan Hapus */
    .btn-round { 
        width: 36px !important;
        height: 36px !important;
        border-radius: 50% !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 0 !important;
        margin: 0 2px !important;
        border: none !important;
        transition: all 0.2s ease-in-out !important;
        cursor: pointer !important;
    }
    .btn-round i { font-size: 16px !important; margin: 0 !important; padding: 0 !important; }
    .btn-round:hover { background-color: #3d3d3d !important; transform: scale(1.05); }
    /* Warna khusus untuk masing-masing tombol */
    .btn-round.btn-info:hover { background-color: #0dcaf0 !important; color: white !important; }
    .btn-round.btn-info { background-color: white !important; color: #0dcaf0 !important; }
    .btn-round.btn-warning:hover { background-color: #ffc107 !important; color: white !important; }
    .btn-round.btn-warning { background-color: white !important; color: #ffc107 !important; }
    .btn-round.btn-danger:hover { background-color: #dc3545 !important; color: white !important; }
    .btn-round.btn-danger { background-color: white !important; color: #dc3545 !important; }

    /* Tampilan Foto Untuk Detail Data Keluarga */
    .view-photo { 
      width: 150px; 
      height: 150px; 
      object-fit: cover; 
      border-radius: 8px; 
      border: 3px solid var(--light-blue);
    }

    /* Header biru terang untuk semua panel/modal */
    .card-header, .modal-header {
        background-color: #007bff !important;
        color: white !important;
    }
    /* Membuat tombol close jadi putih */
    .modal-header .btn-close { filter: brightness(0) invert(1); }
    /* Override untuk memastikan modal tampil */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1055;
    }
    .modal.show { display: block !important; }
    .modal-backdrop { z-index: 1050; }

    /* Styling Pesan (Alert Custom) */
    .form-msg {
        display: none;
        padding: 10px 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .msg-success { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .msg-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .msg-warning { background-color: #fff3cd; color: #fdbf04; border: 1px solid #ffecb5; }
    .msg-info { background-color: #cff4fc; color: #055160; border: 1px solid #b6effb; }

    /* Avatar bulat untuk inisial */
    .avatar-circle {
        width: 50px;
        height: 50px;
        background-color: #416eff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 18px;
        margin: 0 auto;
    }
    .avatar-circle-sm { width: 40px; height: 40px; font-size: 14px; }
    .avatar-circle-lg { width: 150px; height: 150px; font-size: 48px; margin-bottom: 10px; }
    /* Ganti style foto-thumb */
    .foto-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 50%; border: 2px solid #023a7a; }

    /* Styling untuk diagram pohon */
    .tree {
        margin: 0;
        padding: 0;
        list-style: none;
    }
    .tree ul {
        padding-left: 30px;
        margin: 0;
        list-style: none;
    }
    .tree li {
        position: relative;
        padding: 10px 0 0 20px;
        margin: 0;
        list-style: none;
    }
    .tree li::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        border-left: 1px solid #ccc;
        border-bottom: 1px solid #ccc;
        width: 20px;
        height: 20px;
    }
    .tree li:last-child::before {
        border-left: none;
    }
    .tree .node {
        display: inline-block;
        background: #1A365D;
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        margin: 5px 0;
        font-size: 14px;
        min-width: 150px;
        text-align: center;
    }
    .tree .node-root {
        background: #1A365D;
    }
    .tree .node-child {
        background: #2c5282;
    }
    .tree .node-grandchild {
        background: #4299e1;
    }

  </style>
</head>
<body>

  <!-- Indikator Loading -->
  <div class="loading-overlay" id="loader">
    <div class="spinner-border text-primary mb-2"></div>

  </div>

  <!-- Area Login -->

  <!-- Area Aplikasi -->
  <div id="appArea" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Pohon Silsilah Keluarga</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>
   
      <!-- Tampilkan pesan untuk aksi di tabel -->
      <div id="tableMessage" class="form-msg"></div>
      <div class="card p-3 shadow-sm">
        <div class="d-flex justify-content-between mb-3 align-items-center">
            <h5 class="m-0">Data Anggota Keluarga</h5>
            <div class="d-flex gap-2">
                <button class="btn btn-primary btn-sm" onclick="openForm('add')">
                    <i class='fas fa-plus'></i> <span>Tambah</span>
                </button>
                <button class="btn btn-outline-primary btn-sm" onclick="openDiagram('buatDiagram')">
                    <i class='fas fa-sitemap'></i> <span>Diagram</span>

        </div>
  
        <div class="table-responsive">

                <th class="text-center">Foto</th>
                <th>Nama</th>
                <th>Status Kawin</th>

                <th>Status Keluarga</th>
                <th>Nama Ayah</th>
                <th>Nama Ibu</th>

            </thead>

  <!-- Modal Form Anggota -->
  <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="formKeluarga">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Tambah Data</h5>

          </div>

            <input type="hidden" id="formId">

            </div>

          <!-- Tampilkan pesan diatas tombol -->

          <!-- Tampilkan tombol disini -->

  <!-- Modal Form View Data -->
  <div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-light">
          <h5 class="modal-title">Detail Profil Keluarga</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

  <!-- MODAL KONFIRMASI CUSTOM -->
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-body text-center p-4">
          <div class="mb-3"><span style="font-size: 3rem;">⚠️</span></div>
          <h5 id="confirmTitle" class="fw-bold text-dark">Konfirmasi</h5>
          <p id="confirmText" class="small text-muted mb-4"></p>
          <div class="d-flex justify-content-center gap-2">
            <button type="button" class="btn btn-light btn-sm px-4 fw-bold" data-bs-dismiss="modal">BATAL</button>
            <button type="button" class="btn btn-danger btn-sm px-4 fw-bold" id="confirmBtnAction">YA, HAPUS</button>
          </div>
        </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" 
          integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script>
    // *************************      
    // DEKLARASI VARIABEL GLOBAL
    // **************************
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNkJGOxmUZBqfP94UToBvaK0P9BvbfukfW-oUj_vKAYICLpoj86TG4Dch1BPEzaqbP/exec";
    let globalData = [];
    let modalInstance;
    let confirmModalInstance;
    
    document.addEventListener('DOMContentLoaded', function() {
        // Daftarkan modal utama
        const elForm = document.getElementById('formModal');
        if (elForm) modalInstance = new bootstrap.Modal(elForm);
        
        // Daftarkan modal konfirmasi
        const elConfirm = document.getElementById('confirmModal');
        if (elConfirm) confirmModalInstance = new bootstrap.Modal(elConfirm);
        
        // HAPUS pendaftaran viewModalInstance - tidak perlu
        
        // Registrasi Event Submit Form
        const fLogin = document.getElementById('formLogin');
        if (fLogin) fLogin.onsubmit = prosesLogin;
        
        const fKeluarga = document.getElementById('formKeluarga');
        if (fKeluarga) fKeluarga.onsubmit = simpanData;

        // Event untuk diagram
        const btnBuatDiagram   = document.getElementById('btnBuatDiagram');
        const btnDownloadPdf   = document.getElementById('btnDownloadPdf');
        const btnDownloadExcel = document.getElementById('btnDownloadExcel');
        if (btnBuatDiagram) btnBuatDiagram.onclick = generateDiagram;
        if (btnDownloadPdf) btnDownloadPdf.onclick = downloadDiagramPDF;
        if (btnDownloadExcel) btnDownloadExcel.onclick = downloadDiagramExcel;
    });

     /***********************
     * Tampilan showloader 
     ***********************/
    function showLoader(show, text = "Memproses...") {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
      document.getElementById('loaderText').innerText = text;
    }

    /*******************************
     * Fungsi untuk login aplikasi
     * *****************************/
    async function prosesLogin(e) {
    e.preventDefault();
    const user = document.getElementById('loginUsername').value;
    const pass = document.getElementById('loginPassword').value;
    const btn = e.target.querySelector('button[type="submit"]');
    
    // Spinner hanya pada tombol (Point 1)
    const textAsli = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';

    try {
      const resp = await fetch(`${SCRIPT_URL}?action=login&u=${user}&p=${pass}`);
      const res = await resp.json();
        if (res.success) {
            document.getElementById('loginArea').classList.add('d-none');
            document.getElementById('appArea').classList.remove('d-none');
            loadData();
        } else {
            //alert(res.message);
            showMessage(res.message, "error");
        }
      } catch (err) {
          //alert("Gagal terhubung ke server");
          showMessage("Gagal terhubung ke serrver : " + err.message, "error");
      } finally {
          btn.disabled = false;
          btn.innerHTML = textAsli;
      }
    }

    /****************************
     * Buat Tabel Data Keluarga
     * **************************/
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (!tbody) return;
      tbody.innerHTML = '';
      
      if (!globalData || globalData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Data tidak ditemukan atau kosong.</td></tr>';
        return;
      }

      globalData.forEach(item => {
        const img = (item.foto && item.foto.includes('http')) ? item.foto : '[https://via.placeholder.com/50?text=No+Foto](https://via.placeholder.com/50?text=No+Foto)';
        
        tbody.innerHTML += `
          <tr>
            <td><img src="${img}" class="foto-thumb" onerror="this.src='[https://via.placeholder.com/50](https://via.placeholder.com/50)'"></td>
            <td><strong>${item.nama || '-'}</strong></td>
            <td>${item.statusKawin || '-'}</td>
            <td>${item.namaPasangan || '-'}</td>
            <td>${item.statusKeluarga || '-'}</td>
            <td>${item.ayah || '-'}</td>
            <td>${item.ibu || '-'}</td>
            <td class="text-center">
              <div class="d-flex justify-content-center gap-1">
                <button type="button" class="btn btn-info text-white btn-round" onclick="viewDetail('${itemId}')"><i class="fas fa-eye"></i></button>
                <button type="button" class="btn btn-warning text-white btn-round" onclick="openForm('edit', '${itemId}')"><i class="fas fa-pencil"></i></button>
                <button type="button" class="btn btn-danger text-white btn-round" onclick="hapusData('${itemId}', '${itemNama}')"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>`;
      });
    }
 
    /***************************************
     * Untuk tampilkan form Tambah dan Edit
     ***************************************/
    function openForm(mode, id = null) {
    const form = document.getElementById('formKeluarga');
    if (form) form.reset();
    
    document.getElementById('formId').value = "";
    document.getElementById('formMessage').style.display = 'none';
    
    // Reset Tombol Simpan agar tidak disabled (Fix Hang)
    const btn = document.getElementById('btnSimpan');
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = 'Simpan Data';
    }

    // Update Judul Modal (Fix Point 2.2 menggunakan id="modalTitle")
    const titleEl = document.getElementById('modalTitle');
    if (titleEl) {
        titleEl.innerText = (mode === 'edit') ? "Edit Data Keluarga" : "Tambah Data Keluarga";
    }

    if (mode === 'edit' && id) {
        const item = globalData.find(x => x.id == id);
        if (item) {
            document.getElementById('formId').value = item.id;
            document.getElementById('nama').value = item.nama || "";
            document.getElementById('jk').value = item.jk || "Pria";
            document.getElementById('tglLahir').value = item.tglLahir ? new Date(item.tglLahir).toISOString().split('T')[0] : "";
            document.getElementById('statusKawin').value = item.statusKawin || "Lajang";
            document.getElementById('namaPasangan').value = item.namaPasangan || "";
            document.getElementById('statusKeluarga').value = item.statusKeluarga || "Anak";
            document.getElementById('alamat').value = item.alamat || "";
            document.getElementById('kota').value = item.kota || "";
            document.getElementById('ayah').value = item.ayah || "";
            document.getElementById('ibu').value = item.ibu || "";
            document.getElementById('fotoLama').value = item.foto || "";
            if (typeof togglePasangan === 'function') togglePasangan();
        }
    }
    modalInstance.show();
    }


    /******************************
     * Update simpan Data di sheet
    *******************************/
    async function simpanData(e) {
        if (e) e.preventDefault(); // Mencegah reload halaman (PENTING)
        
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Memproses...';
        
        document.getElementById('formMessage').style.display = 'none';

        try {
            let payload = {
                action: "saveData",
                data: {
                    id: document.getElementById('formId').value,
                    nama: document.getElementById('nama').value,
                    jk: document.getElementById('jk').value,
                    tglLahir: document.getElementById('tglLahir').value,
                    statusKawin: document.getElementById('statusKawin').value,
                    namaPasangan: document.getElementById('namaPasangan').value,
                    statusKeluarga: document.getElementById('statusKeluarga').value,
                    alamat: document.getElementById('alamat').value,
                    kota: document.getElementById('kota').value,
                    ayah: document.getElementById('ayah').value,
                    ibu: document.getElementById('ibu').value,
                    fotoLama: document.getElementById('fotoLama').value,
                    fotoBase64: null
                }
            };

            const fileInput = document.getElementById('fotoFile');
            if (fileInput && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(event) {
                    payload.data.fotoBase64 = event.target.result;
                    await kirimData(payload); // Nama fungsi tetap sesuai REV4
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                await kirimData(payload); // Nama fungsi tetap sesuai REV4
            }
        } catch (err) {
            showMessage("Error: " + err.message, "error", "formMessage");
            const btnReset = document.getElementById('btnSimpan');
            btnReset.disabled = false;
            btnReset.innerHTML = 'Simpan Data';
        }
    }

    /*************************************
     * Mengembalikan status tombol simpan
     *************************************/
    function resetSimpanButton() {
    const btn = document.getElementById('btnSimpan');
      if (btn) {
          btn.disabled = false;
          btn.innerHTML = 'SIMPAN DATA';
      }
    }

    /********************************************* 
    * Fungsi untuk mendapatkan inisial dari nama
    **********************************************/
    function getInitials(nama) {
        if (!nama || nama === '-' || nama === '') return '?';
        const parts = nama.trim().split(' ');
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    /****************************************
     * Memuat data keluarga ke dalam tabel
     ***************************************/
    async function loadData() {
        showLoader(true, "Memuat Data Keluarga...");
        try {
            const url = `${SCRIPT_URL}?action=getData`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("Gagal menghubungi server");
            const res = await response.json();
            console.log("Raw Response:", res);
            if (res && res.data && Array.isArray(res.data)) {
                globalData = res.data;
            } else if (Array.isArray(res)) {
                globalData = res;
            } else {
                globalData = [];
            }

            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            if (globalData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center p-4"><div class="text-muted">Tidak ada data ditemukan di database</div></td></tr>`;
                return;
            }

            globalData.forEach((item) => {
                const itemId = item.id ? String(item.id) : '';
                const itemNama = item.nama ? item.nama : 'Tanpa Nama';
                const itemNamaEscaped = itemNama.replace(/'/g, "\\'");
                // Handle foto atau avatar
                const fotoUrl = item.foto && item.foto.includes('http') ? item.foto : null;
                const initials = getInitials(item.nama);
                let fotoDisplay = '';
                if (fotoUrl) {
                    fotoDisplay = `<img src="${fotoUrl}" class="foto-thumb" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'avatar-circle\'>${initials}</div>';">`;
                } else {
                    fotoDisplay = `<div class="avatar-circle">${initials}</div>`;
                }
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-center">${fotoDisplay}</td>
                    <td>${item.nama || '-'}</td>
                    <td>${item.statusKawin || '-'}</td>
                    <td>${item.namaPasangan || '-'}</td>
                    <td>${item.statusKeluarga || '-'}</td>
                    <td>${item.ayah || '-'}</td>
                    <td>${item.ibu || '-'}</td>
                    <td class="text-center">
                        <div class="btn-group btn-group-sm">
                            <button type="button" class="btn btn-info btn-round" onclick="viewDetail('${itemId}')"><i class="fas fa-eye"></i></button>
                            <button type="button" class="btn btn-warning btn-round" onclick="openForm('edit', '${itemId}')"><i class="fas fa-pencil"></i></button>
                            <button type="button" class="btn btn-danger btn-round" onclick="hapusData('${itemId}', '${itemNamaEscaped}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            console.log(`Berhasil merender ${globalData.length} baris data.`);
        } catch (error) {
            console.error("Error saat loadData:", error);
            const tbody = document.getElementById('tableBody');
            if (tbody) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center p-4"><div class="text-danger">Gagal memuat data: ${error.message}</div></td></tr>`;
            }
        } finally {
            showLoader(false);
        }
    }

    /*************************************
     * Fungsi untuk menghapus record data
     *************************************/
    function hapusData(id, nama) {
        try {
            const item = globalData.find(x => String(x.id) === String(id));
            if (!item) {
                showMessage("Data tidak ditemukan", "error", "tableMessage");
                return;
            }
            // Hapus modal dinamis jika sudah ada sebelumnya
            const existingModal = document.getElementById('dynamicConfirmModal');
            if (existingModal) {
                existingModal.remove();
            }

            // Buat modal konfirmasi dinamis (sama persis dengan viewDetail)
            const modalHtml = `
                <div class="modal fade" id="dynamicConfirmModal" tabindex="-1" aria-hidden="true" style="display:block; z-index:9999;">
                    <div class="modal-dialog modal-sm modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-body text-center p-4">
                                <div class="mb-3"><span style="font-size: 3rem;">⚠️</span></div>
                                <h5 class="fw-bold text-dark">Konfirmasi Hapus</h5>
                                <p class="small text-muted mb-4">Apakah Anda yakin ingin menghapus data "<strong>${nama}</strong>" dari sistem?</p>
                                <div class="d-flex justify-content-center gap-2">
                                    <button type="button" class="btn btn-light btn-sm px-4 fw-bold" id="confirmBatalBtn">BATAL</button>
                                    <button type="button" class="btn btn-danger btn-sm px-4 fw-bold" id="confirmHapusBtn">YA, HAPUS</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Tambahkan ke body
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            // Tampilkan modal
            const modalElement = document.getElementById('dynamicConfirmModal');
            const modal = new bootstrap.Modal(modalElement, {
                backdrop: true,
                keyboard: true
            });
            modal.show();
            // Tombol BATAL
            document.getElementById('confirmBatalBtn').onclick = function() {
                modal.hide();
                setTimeout(() => modalElement.remove(), 300);
            };

            // Tombol HAPUS
            document.getElementById('confirmHapusBtn').onclick = async function() {
                modal.hide();
                // Gunakan cara yang SAMA dengan simpanData/kirimData
                showLoader(true, "Menghapus data...");
                try {
                    const resp = await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: "deleteData", id: id.toString() }) 
                    });
                    const res = await resp.json();
                    if (res.success) {
                        showMessage(`Data "${nama}" berhasil dihapus`, "success", "tableMessage");
                        setTimeout(() => modalElement.remove(), 300);
                        loadData(); // Refresh tabel
                    } else {
                        showMessage("Gagal menghapus: " + (res.message || "Unknown error"), "error", "tableMessage");
                        setTimeout(() => modalElement.remove(), 300);
                    }
                } catch (e) {
                    console.error("Error:", e);
                    showMessage("Kesalahan koneksi: " + e.message, "error", "tableMessage");
                    setTimeout(() => modalElement.remove(), 300);
                } finally {
                    showLoader(false);
                }
            };

            // Hapus modal setelah ditutup
            modalElement.addEventListener('hidden.bs.modal', function() {
                modalElement.remove();
            });
        } catch (e) {
            console.error("Error:", e);
            showMessage("Gagal menampilkan konfirmasi", "error", "tableMessage");
        }
    }

    // Membangun struktur tree berdasarkan ID yang dipilih
    function buildFamilyTree(startId) {
        const treeMap = {};
        
        // Buat mapping semua data berdasarkan ID
        globalData.forEach(item => {
            treeMap[item.id] = {
                ...item,
                children: []
            };
        });
        
        // Bangun relasi parent-child (berdasarkan ayah/ibu)
        globalData.forEach(item => {
            if (item.ayah) {
                const parent = Object.values(treeMap).find(p => p.nama === item.ayah);
                if (parent && parent.id !== item.id && parent.id) {
                    if (!parent.children.find(c => c.id === item.id)) {
                        parent.children.push(treeMap[item.id]);
                    }
                }
            }
            if (item.ibu) {
                const parent = Object.values(treeMap).find(p => p.nama === item.ibu);
                if (parent && parent.id !== item.id && parent.id) {
                    if (!parent.children.find(c => c.id === item.id)) {
                        parent.children.push(treeMap[item.id]);
                    }
                }
            }
        });
        
        return treeMap[startId] || null;
    }

    // Render tree ke HTML
    function renderTree(node, level = 0) {
        if (!node) return '';
        
        let html = `<li><div class="node ${level === 0 ? 'node-root' : (level === 1 ? 'node-child' : 'node-grandchild')}">${node.nama || '-'}<br><small>${node.statusKeluarga || ''}</small></div>`;
        
        if (node.children && node.children.length > 0) {
            html += '<ul>';
            node.children.forEach(child => {
                html += renderTree(child, level + 1);
            });
            html += '</ul>';
        }
        html += '</li>';
        return html;
    }

    // Generate Diagram
    function generateDiagram() {
        const selectElement = document.getElementById('pilihNamaDiagram');
        if (!selectElement) {
            showMessage("Error: Dropdown tidak ditemukan", "error", "tableMessage");
            return;
        }
        
        const selectId = selectElement.value;
        if (!selectId) {
            showMessage("Silakan pilih nama terlebih dahulu!", "warning", "tableMessage");
            return;
        }
        
        showLoader(true, "Membuat diagram pohon...");
        
        try {
            const rootNode = buildFamilyTree(selectId);
            const container = document.getElementById('diagramContainer');
            
            if (container) {
                if (rootNode) {
                    const treeHtml = `
                        <div class="tree">
                            <ul>
                                ${renderTree(rootNode)}
                            </ul>
                        </div>
                    `;
                    container.innerHTML = treeHtml;
                    showMessage("Diagram berhasil dibuat", "success", "tableMessage");
                } else {
                    container.innerHTML = '<div class="text-center text-danger p-5">Tidak dapat membangun diagram pohon untuk nama yang dipilih</div>';
                }
            }
        } catch (error) {
            console.error("Error generateDiagram:", error);
            showMessage("Gagal membuat diagram: " + error.message, "error", "tableMessage");
        } finally {
            showLoader(false);
        }
    }

    // Download sebagai PDF
    function downloadDiagramPDF() {
        const container = document.getElementById('diagramContainer');
        if (!container || container.innerHTML.includes('Silakan pilih') || container.innerHTML.includes('Tidak dapat membangun')) {
            showMessage("Tidak ada diagram untuk diunduh. Buat diagram terlebih dahulu.", "warning", "tableMessage");
            return;
        }
        
        showLoader(true, "Menyiapkan PDF...");
        
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: 'family_tree.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, logging: false },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        
        html2pdf().set(opt).from(container).save().then(() => {
            showLoader(false);
            showMessage("PDF berhasil diunduh", "success", "tableMessage");
        }).catch(err => {
            console.error("PDF Error:", err);
            showLoader(false);
            showMessage("Gagal membuat PDF: " + err.message, "error", "tableMessage");
        });
    }

    // Download sebagai Excel
    function downloadDiagramExcel() {
        if (!globalData || globalData.length === 0) {
            showMessage("Tidak ada data untuk diekspor", "warning", "tableMessage");
            return;
        }
        
        showLoader(true, "Menyiapkan Excel...");
        
        try {
            const excelData = globalData.map(item => ({
                'ID': item.id,
                'Nama': item.nama,
                'Jenis Kelamin': item.jk,
                'Tanggal Lahir': item.tglLahir ? new Date(item.tglLahir).toLocaleDateString('id-ID') : '-',
                'Status Kawin': item.statusKawin,
                'Nama Pasangan': item.namaPasangan,
                'Status Keluarga': item.statusKeluarga,
                'Ayah': item.ayah,
                'Ibu': item.ibu,
                'Alamat': item.alamat,
                'Kota': item.kota
            }));
            
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data Keluarga");
            XLSX.writeFile(wb, "data_keluarga.xlsx");
            
            showLoader(false);
            showMessage("File Excel berhasil diunduh", "success", "tableMessage");
        } catch (error) {
            console.error("Excel Error:", error);
            showLoader(false);
            showMessage("Gagal membuat Excel: " + error.message, "error", "tableMessage");
        }
    }

    /**************************************
    * Fungsi untuk Logika Kondisi Pasangan
    ***************************************/
    function togglePasangan() {
        const jk = document.getElementById('jk').value;
        const statusKawin = document.getElementById('statusKawin').value;
        const divPasangan = document.getElementById('divPasangan');
        const labelPasangan = document.getElementById('labelPasangan');
        let show = false;
        if (jk === "Pria") {
            if (statusKawin === "Kawin" || statusKawin === "Cerai") {
                labelPasangan.innerText = "Nama Istri";
                show = true;
            }
        } else if (jk === "Wanita") {
            if (statusKawin === "Kawin" || statusKawin === "Cerai") {
                labelPasangan.innerText = "Nama Suami";
                show = true;
            }
        }
        divPasangan.style.display = show ? "block" : "none";
        if (!show) document.getElementById('namaPasangan').value = "";
    }

    /*****************************************************************
     * Fungsi Pesan General
     * @param {string} msg - Teks pesan
     * @param {string} type - success, error, warning, info
     * @param {string} elementId - ID element tempat menampilkan pesan
     ******************************************************************/
    function showMessage(msg, type = 'info', elementId = 'formMessage') {
        const el = document.getElementById(elementId);
        if (!el) return;
        // Mapping Ikon
        const icons = {
            success: '✅',
            error: '❌',
            warning: '⚠️',
            info: 'ℹ️'
        };
        el.className = `form-msg msg-${type}`;
        el.innerHTML = `<span>${icons[type] || '•'}</span> <span>${msg}</span>`;
        el.style.display = 'flex';
        // Sembunyikan otomatis dalam 5 detik
        setTimeout(() => {
            el.style.display = 'none';
        }, 5000);
    }
