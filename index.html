<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aplikasi Silsilah Keluarga</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Visualization API untuk Tree/OrgChart -->
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  
  <style>
    :root {
      --dark-blue: #1A365D;
      --light-blue: #63B3ED;
      --light-gray: #EDF2F7;
      --white: #FFFFFF;
      --black: #1A202C;
    }
    body {
      background-color: var(--light-gray);
      color: var(--black);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .navbar { background-color: var(--dark-blue) !important; }
    .card-header { background-color: var(--dark-blue); color: var(--white); }
    .btn-primary {
      background-color: var(--light-blue);
      border-color: var(--light-blue);
      color: var(--dark-blue);
      font-weight: 600;
    }
    .btn-primary:hover { background-color: var(--dark-blue); color: var(--white); }
    .table-dark { background-color: var(--dark-blue) !important; }
    .foto-thumb {
      width: 50px; height: 50px; object-fit: cover;
      border-radius: 50%; border: 2px solid var(--light-blue);
    }
    .tree-container { overflow-x: auto; padding: 20px; min-height: 500px; }
    
    /* Custom OrgChart Styling */
    .google-visualization-orgchart-node {
      border: 2px solid var(--light-blue) !important;
      border-radius: 8px !important;
      background-color: var(--white) !important;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 10px !important; font-family: inherit !important;
    }
    .google-visualization-orgchart-node-img {
      width: 60px; height: 60px; object-fit: cover;
      border-radius: 50%; margin-bottom: 5px;
    }
    .org-name { font-weight: bold; color: var(--dark-blue); font-size: 14px; }
    .org-status { font-size: 11px; color: gray; }

    @media print {
      .no-print, .nav-tabs, .navbar, .btn { display: none !important; }
      body { background-color: white; }
      .print-area { display: block !important; }
      .tree-container { box-shadow: none; border: none; }
    }
    
    /* Overlay Loading */
    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      flex-direction: column; display: none;
    }
  </style>
</head>
<body>

  <!-- Loading Indicator -->
  <div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 fw-bold" id="loadingText">Memproses...</div>
  </div>

  <!-- AREA LOGIN -->
  <div id="loginArea" class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-header text-center">
            <h4>Login Sistem Silsilah</h4>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label>Username</label>
              <input type="text" id="loginUsername" class="form-control" placeholder="admin">
            </div>
            <div class="mb-3">
              <label>Password</label>
              <input type="password" id="loginPassword" class="form-control" placeholder="admin123">
            </div>
            <button class="btn btn-primary w-100" onclick="prosesLogin()">Login</button>
            <div id="loginMsg" class="text-danger mt-2 text-center"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- AREA APLIKASI -->
  <div id="appArea" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark no-print">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Pohon Silsilah Keluarga</a>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="container mt-4">
      <ul class="nav nav-tabs no-print" id="myTab" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#data" type="button">Data Keluarga</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="pohon-tab" data-bs-toggle="tab" data-bs-target="#pohon" type="button" onclick="renderTree()">Pohon Silsilah</button>
        </li>
      </ul>
      
      <div class="tab-content mt-3">
        <!-- TAB DATA -->
        <div class="tab-pane fade show active no-print" id="data">
          <div class="d-flex justify-content-between mb-3">
            <h4>Daftar Anggota</h4>
            <button class="btn btn-success" onclick="openForm('add')">+ Tambah Anggota</button>
          </div>
          <div class="table-responsive bg-white p-3 rounded shadow-sm">
            <table class="table table-hover table-bordered align-middle">
              <thead class="table-dark">
                <tr><th>Foto</th><th>Nama</th><th>Status</th><th>Ayah</th><th>Ibu</th><th>Aksi</th></tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- TAB POHON -->
        <div class="tab-pane fade print-area" id="pohon">
          <div class="d-flex justify-content-between mb-3 no-print">
            <h4>Bagan Silsilah</h4>
            <button class="btn btn-primary" onclick="downloadPDF()">Download PDF / Print</button>
          </div>
          <div class="tree-container bg-white rounded shadow-sm">
            <div id="chart_div"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL FORM -->
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Form Data</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formKeluarga">
            <input type="hidden" id="formId"><input type="hidden" id="formAction" value="add"><input type="hidden" id="fotoLama">
            <div class="row">
              <div class="col-md-6 mb-2"><label>Nama Lengkap</label><input type="text" id="nama" class="form-control" required></div>
              <div class="col-md-6 mb-2">
                <label>Jenis Kelamin</label>
                <select id="jk" class="form-select"><option>Laki-laki</option><option>Perempuan</option></select>
              </div>
              <div class="col-md-6 mb-2"><label>Tanggal Lahir</label><input type="date" id="tglLahir" class="form-control" required></div>
              <div class="col-md-6 mb-2">
                <label>Status Perkawinan</label>
                <select id="statusKawin" class="form-select"><option>Single</option><option>Kawin</option><option>Duda</option><option>Janda</option></select>
              </div>
              <div class="col-md-6 mb-2">
                <label>Status Keluarga</label>
                <select id="statusKeluarga" class="form-select"><option>Suami</option><option>Istri</option><option>Anak</option><option>Cucu</option><option>Cicit</option></select>
              </div>
              <div class="col-md-6 mb-2"><label>Kota</label><input type="text" id="kota" class="form-control"></div>
              <div class="col-md-12 mb-2"><label>Alamat</label><textarea id="alamat" class="form-control" rows="2"></textarea></div>
              <div class="col-md-6 mb-2"><label>Nama Ayah (Tulis Persis)</label><input type="text" id="ayah" class="form-control" placeholder="Kosongkan jika root/leluhur"></div>
              <div class="col-md-6 mb-2"><label>Nama Ibu</label><input type="text" id="ibu" class="form-control"></div>
              <div class="col-md-12 mb-2"><label>Upload Foto</label><input type="file" id="fotoFile" class="form-control" accept="image/*"></div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn btn-primary" onclick="simpanData()">Simpan Data</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // =========================================================
    // WAJIB UBAH: Masukkan URL Deploy Web App GAS Anda di bawah ini
    // =========================================================
    const GAS_URL  = "https://script.google.com/macros/s/AKfycbzKREHeFiL5mlLjXke-3DX8_e4Rqv5BOLPF0bL9-8cQ69inLuvYxR1MGxUci5IlHVJ3/exec"; 
    let globalData = [];
    let formModal;
    
    document.addEventListener("DOMContentLoaded", () => {
      formModal = new bootstrap.Modal(document.getElementById('formModal'));
      google.charts.load('current', {packages:["orgchart"]});
    });

    // 1. GANTI Fungsi apiCall
    // Menggunakan URLSearchParams agar dianggap sebagai "Simple Request" oleh browser
    async function apiCall(payload, loadingMsg) {
    showLoading(loadingMsg);
    try {
        const body = new URLSearchParams();
        body.append('formData', JSON.stringify(payload));

        // Mode no-cors digunakan untuk POST ke GAS agar tidak kena blokir
        await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString()
        });

        hideLoading();
        return { success: true }; 
    } catch (err) {
        hideLoading();
        console.error(err);
        return { success: false, message: err.message };
    }
    }

    
    // 3. GANTI Fungsi prosesLogin
    // Verifikasi login menggunakan GET agar respon JSON bisa dibaca langsung
    async function prosesLogin() {
    const u = document.getElementById('loginUsername').value;
    const p = document.getElementById('loginPassword').value;
    
    showLoading("Memverifikasi...");
    try {
        const res = await fetch(`${GAS_URL}?action=login&u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`);
        const data = await res.json();
        
        if(data.success) {
        document.getElementById('loginArea').classList.add('d-none');
        document.getElementById('appArea').classList.remove('d-none');
        fetchData();
        } else {
        document.getElementById('loginMsg').innerText = data.message;
        }
    } catch(e) {
        console.error(e);
        alert("Koneksi Error atau URL GAS salah.");
    }
    hideLoading();
    }

    // 4. GANTI Fungsi eksekusi (Bagian dari simpanData)
    // Menambahkan jeda (delay) agar data sempat masuk ke Google Sheets sebelum di-refresh


    // --- Loading UI ---
    function showLoading(msg) {
      document.getElementById('loadingText').innerText = msg;
      document.getElementById('loadingOverlay').style.display = 'flex';
    }
    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function logout() {
      document.getElementById('loginArea').classList.remove('d-none');
      document.getElementById('appArea').classList.add('d-none');
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
    }

    /**
     * REVISI FUNGSI RENDER TABLE
     * Menambahkan pengecekan agar tidak error jika data kosong atau undefined
     */
    function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;

    // Cek apakah globalData ada dan merupakan array
    if (!globalData || !Array.isArray(globalData) || globalData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Tidak ada data keluarga ditemukan.</td></tr>';
        return;
    }

    tbody.innerHTML = globalData.map(item => `
        <tr>
        <td class="text-center">
            <img src="${item.foto || 'https://via.placeholder.com/50'}" class="foto-thumb" onerror="this.src='https://via.placeholder.com/50'">
        </td>
        <td><strong>${item.nama || '-'}</strong></td>
        <td><span class="badge bg-info text-dark">${item.statusKeluarga || '-'}</span></td>
        <td>${item.ayah || '-'}</td>
        <td>${item.ibu || '-'}</td>
        <td>
            <button class="btn btn-sm btn-warning" onclick="openForm('edit', '${item.id}')">Edit</button>
        </td>
        </tr>
    `).join('');
    }

    /**
     * REVISI FUNGSI FETCH DATA
     * Memastikan globalData selalu berbentuk Array sebelum memanggil renderTable
     */
    async function fetchData() {
    showLoading("Sinkronisasi Data...");
    try {
        const response = await fetch(`${GAS_URL}?action=getData`);
        if (!response.ok) throw new Error("Gagal menghubungi server");
        
        const result = await response.json();
        
        // Pastikan result.data adalah Array
        if (result.success && result.data) {
        globalData = Array.isArray(result.data) ? result.data : [];
        } else {
        globalData = [];
        }
        
        renderTable();
        // Jika tab pohon sedang aktif, render ulang pohonnya
        if (document.getElementById('tab-pohon').classList.contains('show')) {
        renderTree();
        }
    } catch (err) {
        console.error("Gagal sinkron:", err);
        globalData = []; // Reset ke array kosong agar renderTable tidak crash
        renderTable();
    }
    hideLoading();
    }

    /**
     * REVISI FUNGSI EKSEKUSI
     * Memberikan jeda lebih lama agar Google Sheets selesai menulis sebelum di-fetch ulang
     */
    async function eksekusi(data) {
    try {
        await apiCall({ action: "saveData", data: data }, "Menyimpan ke Cloud...");
        modalCtrl.hide();
        
        // Karena mode 'no-cors', kita beri jeda 3 detik 
        // agar Google Script punya waktu memproses data sebelum kita minta data terbaru
        setTimeout(() => {
        fetchData();
        }, 3000);
    } catch (error) {
        alert("Gagal mengirim data: " + error.message);
    }
    }

    // --- LOAD DATA TABLE ---
    async function loadDataKeluarga() {
      const res = await apiCall({ action: "getData" }, "Memuat Data...");
      if(res.success) {
        globalData = res.data;
        renderTable();
      }
    }

    // --- CRUD ---
    function openForm(action, id = null) {
      document.getElementById('formKeluarga').reset();
      document.getElementById('formAction').value = action;
      
      if(action === 'edit') {
        document.getElementById('modalTitle').innerText = "Edit Data";
        const item = globalData.find(x => x.id == id);
        if(item) {
          ['id','nama','jk','tglLahir','statusKawin','statusKeluarga','kota','alamat','ayah','ibu'].forEach(k => {
             document.getElementById(k==='id'?'formId':k).value = item[k] || '';
          });
          document.getElementById('fotoLama').value = item.foto;
        }
      } else {
        document.getElementById('modalTitle').innerText = "Tambah Data";
        document.getElementById('formId').value = "";
        document.getElementById('fotoLama').value = "";
      }
      formModal.show();
    }

    function simpanData() {
      const fileInput = document.getElementById('fotoFile');
      let dataObj = {
        id: document.getElementById('formId').value,
        action: document.getElementById('formAction').value,
        nama: document.getElementById('nama').value,
        jk: document.getElementById('jk').value,
        tglLahir: document.getElementById('tglLahir').value,
        statusKawin: document.getElementById('statusKawin').value,
        statusKeluarga: document.getElementById('statusKeluarga').value,
        kota: document.getElementById('kota').value,
        alamat: document.getElementById('alamat').value,
        ayah: document.getElementById('ayah').value,
        ibu: document.getElementById('ibu').value,
        fotoLama: document.getElementById('fotoLama').value,
        fotoBase64: null
      };

      if(!dataObj.nama) return alert("Nama wajib diisi!");

      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          dataObj.fotoBase64 = e.target.result;
          eksekusiSimpan(dataObj);
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        eksekusiSimpan(dataObj);
      }
    }

    async function eksekusiSimpan(dataObj) {
      const res = await apiCall({ action: "saveData", data: dataObj }, "Menyimpan Data...");
      if(res.success) {
        alert(res.message);
        formModal.hide();
        loadDataKeluarga();
      } else {
        alert("Gagal: " + res.message);
      }
    }

    async function hapusData(id) {
      if(confirm("Yakin ingin menghapus data ini?")) {
        const res = await apiCall({ action: "deleteData", id: id }, "Menghapus Data...");
        if(res.success) loadDataKeluarga();
      }
    }

    // --- POHON SILSILAH ---
    function renderTree() {
      if(!google.visualization || globalData.length === 0) return;
      const data = new google.visualization.DataTable();
      data.addColumn('string', 'Name');
      data.addColumn('string', 'Parent');
      data.addColumn('string', 'ToolTip');

      let chartRows = globalData.map(item => {
        let fotoImg = item.foto || 'https://via.placeholder.com/60';
        let nodeHtml = `<div class="org-node"><img src="${fotoImg}" class="google-visualization-orgchart-node-img"><br>
                        <div class="org-name">${item.nama}</div><div class="org-status">${item.statusKeluarga}</div></div>`;
        return [{ v: item.nama, f: nodeHtml }, item.ayah || '', item.statusKawin];
      });

      data.addRows(chartRows);
      const chart = new google.visualization.OrgChart(document.getElementById('chart_div'));
      chart.draw(data, {allowHtml: true, size: 'large', nodeClass: 'google-visualization-orgchart-node'});
    }

    function downloadPDF() {
      window.print();
    }

   
  </script>
</body>
</html>
