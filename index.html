<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Silsilah Keluarga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> -->
  <style>
    :root { --dark-blue: #1A365D; --light-blue: #63B3ED; --light-gray: #EDF2F7; } 
    body { background-color: var(--light-gray); font-family: 'Segoe UI', sans-serif; }
    .navbar { background-color: var(--dark-blue) !important; }
    .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
  
    /* Tampilan  Foto Pada Tabel Data Kelauarga */
    .foto-thumb { 
      width: 50px; 
      height: 50px; 
      object-fit: cover; 
      border-radius: 50%; 
      border: 2px solid var(--light-blue); 
    }
    
    /* Tombol bulat dengan icon pada Tabel Data Keluarga : View, Edit dan Hapus */
    .btn-round { 
        width: 36px !important;
        height: 36px !important;
        border-radius: 50% !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 0 !important;
        margin: 0 2px !important;
        border: none !important;
        transition: all 0.2s ease-in-out !important;
        cursor: pointer !important;
    }
    .btn-round i { font-size: 16px !important; margin: 0 !important; padding: 0 !important; }
    .btn-round:hover { background-color: #3d3d3d !important; transform: scale(1.05); }
    /* Warna khusus untuk masing-masing tombol */
    .btn-round.btn-info:hover { background-color: #0dcaf0 !important; color: white !important; }
    .btn-round.btn-info { background-color: white !important; color: #0dcaf0 !important; }
    .btn-round.btn-warning:hover { background-color: #ffc107 !important; color: white !important; }
    .btn-round.btn-warning { background-color: white !important; color: #ffc107 !important; }
    .btn-round.btn-danger:hover { background-color: #dc3545 !important; color: white !important; }
    .btn-round.btn-danger { background-color: white !important; color: #dc3545 !important; }

    /* Tampilan Foto Untuk Detail Data Keluarga */
    .view-photo { 
      width: 150px; 
      height: 150px; 
      object-fit: cover; 
      border-radius: 8px; 
      border: 3px solid var(--light-blue);
    }

    /* Header biru terang untuk semua panel modal */
    .card-header, .modal-header {
        background-color: #007bff !important;
        color: white !important;
    }
    /* Membuat tombol close jadi putih */
    .modal-header .btn-close { filter: brightness(0) invert(1); }
    /* Override untuk memastikan modal tampil */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1055;
    }
    .modal.show { display: block !important; }
    .modal-backdrop { z-index: 1050; }

    /* Styling Pesan (Alert Custom) */
    .form-msg {
        display: none;
        padding: 10px 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        margin-left: 12px;    /* Jarak sisi kiri dari form */
        margin-right: 12px;   /* Jarak sisi kanan dari form */
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .msg-success { background-color: #0f5132; color: #ffffff; border: 1px solid #00351c; }
    .msg-error { background-color: #a5000e; color: #ffffff; border: 1px solid #520000; }
    .msg-warning { background-color: #ffd556; color: #ffffff; border: 1px solid #e4ba00; }
    .msg-info { background-color: #0057a8; color: #ffffff; border: 1px solid #2f90ff; }

    /* Avatar bulat untuk inisial */
    .avatar-circle {
        width: 50px;
        height: 50px;
        background-color: #416eff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 18px;
        margin: 0 auto;
    }
    .avatar-circle-sm { width: 40px; height: 40px; font-size: 14px; }
    .avatar-circle-lg { width: 150px; height: 150px; font-size: 48px; margin-bottom: 10px; }
    /* Ganti style foto-thumb */
    .foto-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 50%; border: 2px solid #023a7a; }

    /* Diagram pohon silsilah */
    .tree-diagram {
        font-family: 'Segoe UI', sans-serif;
        padding: 20px;
        overflow-x: auto;
        overflow-y: auto;
        max-height: 550px;
        text-align: center;
    }
    .tree-root {
        display: inline-flex;
        flex-direction: row;
        justify-content: center;
        gap: 40px;
        list-style: none;
        margin: 0;
        padding: 0;
    }
    .family-node {
        position: relative;
        display: inline-block;
        vertical-align: top;
        text-align: center;
    }
    .couple-group {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        align-items: center;
        gap: 1px;             /* kurangi dari 15px/20px menjadi 5px = untuk mengatur jarak suami dan istri */
        margin-bottom: 5px;   /* 30px jarak antara pasangan dan garis horizontal */
    }
    .couple-connector {
        font-size: 24px;      /* Ukuran simbol "x" dan "+" */
        font-weight: bold;
        display: inline-flex;
        align-items:center;
        justify-content: center;
        min-width: 10px;     /* kurangi dari 40px = untuk mengatur jarak suami dan istri */
        margin: 0 2px;       /* kurangi margin samping = untuk mengatur jarak suami dan istri */
        color: #2c3e66;
    }

    /* GARIS HORIZONTAL TIDAK BERLEBIH */
    .children-connector {
        position: relative;
        display : inline-block;    /* lebar mengikuti isi (children-wrapper) */
    }
    .children-connector::before {
        content: '';
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 30px;
        background-color: #555;
        z-index: 1;
    }
    .children-connector::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background-color: #555;
        z-index: 1;
    }
    .children-wrapper {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        gap: 40px;
        position: relative;
        padding-top: 20px;
    }
    /* Garis vertikal dari garis horizontal ke setiap anak */
    .family-node::before {
        content: '';
        position: absolute;
        top: -20px;            /* Garis vertikal naik setinggi padding-top */
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 25px;          /* 20px Tinggi garis vertikal "T" */
        background-color: #555;
        z-index: 1;
    }
    /* Tampilan node */
    .diagram-node {
        text-align: center;
        margin: 5px;
    }
    .diagram-foto {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 50%;
        border: 2px solid #1A365D;
        background: white;
    }
    .diagram-avatar {
        width: 60px;
        height: 60px;
        background-color: #1A365D;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 20px;
        margin: 0 auto;
    }
    .diagram-name {
        font-size: 12px;
        font-weight: 600;
        margin-top: 5px;
    }
    .diagram-year {
        font-size: 10px;
        color: #666;
    }

    /* Untuk mobile device */
    @media (max-width: 768px) {
        .diagram-foto, .diagram-avatar { width: 45px; height: 45px; font-size: 16px; }
        .diagram-name { font-size: 10px; }
        .diagram-year { font-size: 8px; }
        .children-wrapper { gap: 20px; }
        .couple-group { gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loader">
    <div class="spinner-border text-primary mb-2"></div>
    <div id="loaderText">Memproses...</div>
  </div>

  <!-- AREA LOGIN -->

    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">

              <footer class="section footer-classic context-light mt-2">

                </div>

          </div>

    </div>
  </div>

  <!-- AREA APLIKASI -->
  <div id="appArea" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Pohon Silsilah Keluarga</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>
   
      <!-- Tampilkan pesan untuk aksi di tabel -->
      <div id="tableMessage" class="form-msg"></div>
      <div class="card p-3 shadow-sm">
        <div class="d-flex justify-content-between mb-3 align-items-center">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0 fw-bold">Data Anggota Keluarga</h5>
            </div>
            <div class="d-flex align-items-center gap-3">
                <!-- Bagian Cari -->
                <div class="input-group input-group-sm" style="width: 320px;">
                    <input type="text" id="cariNama" class="form-control" placeholder="Cari nama...">
                    <button class="btn btn-primary" onclick="cariData()">
                        <i class='fas fa-search'></i>
                    </button>
                </div>
                <!-- Bagian Tombol Aksi -->
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" onclick="openForm('add')">

                    <button class="btn btn-outline-secondary btn-sm" onclick="openDiagram('buatDiagram')">

        <div class="table-responsive">

              <tr>
                <th class="text-center">Foto</th>
                <th>Nama</th>
                <th>Status Kawin</th>

                <th>Status Keluarga</th>

  </div>

  <!-- TAMPILAN Modal untuk Form INPUT DAN EDIT Anggota -->
  <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="formKeluarga">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Tambah Data</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="formId">
            <input type="hidden" id="fotoLama">
            <div class="row g-3">
             
              <div class="input-group mt-4">
                <span class="input-group-text"><i class="fas fa-user-alt" style="font-size:17px"></i></span>
                <input type="text" id="nama" class="form-control" placeholder="Input nama anda tanpa nama ayah" oninput="this.value = this.value.toLowerCase().substring(0, 40)" maxlength="40" pattern="[A-Za-z ]+" required >
              </div>

              <div class="input-group mt-2">
                <span class="input-group-text"><i class="fas fa-calendar-alt" style="font-size:19px"></i></span>
                <input type="text" id="tglLahir" placeholder="Input tgl lahir" class="form-control" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'" required>
              </div>

              <!--TAMBAHAN FIELD ALMARHUM -->
              <div class="input-group mt-2">
                <span class="input-group-text"><i class="fas fa-bed" style="font-size:14px"></i></span>
                <select id="wafat" class="form-select" onchange="toggleWafat()" required>
                   <option value="">Apakah sudah almarhum...</option>

                </select>
              </div>
              
              <!-- TAMBAHAN FIELD TGL WAFAT, FIELD INI TAMPIL JIKA FIELD ALMARHUM="y" -->
              <div class="input-group mt-2" id="divTglWafat" style="display:none;">  
                <span class="input-group-text"><i class="fas fa-calendar-times" style="font-size:17px"></i></span>
                <input type="text" id="tglWafat" placeholder="Input tgl wafatnya" class="form-control" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'" >
              </div>

              <div class="input-group mt-2">
                <span class="input-group-text"><i class="fas fa-venus-mars" style="font-size:13px"></i></span>
                <select id="jk" class="form-select" onchange="togglePasangan()" required>

                </select>
              </div>

                <span class="input-group-text"><i class="fas fa-heart" style="font-size:16px"></i></span>
                <select id="statusKawin" class="form-select" onchange="togglePasangan()" required>
                    <option value="">Pilih Status Perkawinan...</option>

                    <option value="kawin">kawin</option>

                </select>
              </div>
             
              <div class="input-group mt-2" id="divPasangan" style="display:none;">

              </div>

              <div class="input-group mt-2">

                <input type="text" id="kota" class="form-control" placeholder="Input kota anda" oninput="this.value = this.value.toLowerCase().substring(0, 40)" maxlength="40" pattern="[A-Za-z ]+">
              </div>

              <div class="input-group mt-2">
                <span class="input-group-text"><i class="fas fa-male" style="font-size:26px"></i></span>
                <input type="text" id="ayah" class="form-control" placeholder="Input nama ayah anda" oninput="this.value = this.value.toLowerCase().substring(0, 40)" maxlength="40" pattern="[A-Za-z ]+" >
              </div>

              <div class="input-group mt-2">
                <span class="input-group-text"><i class="fas fa-female" style="font-size:26px"></i></span>
                <input type="text" id="ibu" class="form-control" placeholder="Input nama ibu anda" oninput="this.value = this.value.toLowerCase().substring(0, 40)" maxlength="40" pattern="[A-Za-z ]+" >
              </div>

              <div class="input-group mt-2">
                <span class="input-group-text"><i class="fas fa-cloud-upload-alt" style="font-size:14px"></i></span>
                <!-- Input teks untuk menampilkan nama file atau placeholder -->
                <input type="text" id="fotoLabel" class="form-control text-muted" value="Tidak ada file foto terpilih" readonly onclick="document.getElementById('fotoFile').click()" style="cursor: pointer; background-color: #fff;">
                <!-- Tombol kustom -->
                <button class="btn btn-outline-secondary rounded-end" type="button" onclick="document.getElementById('fotoFile').click()">Pilih Foto</button>

              </div>

            </div>
          </div>
          <!-- Tampilkan pesan diatas tombol -->
          <div id="formMessage" class="form-msg"></div>
          <div id="formKeluargaMessage" class="form-msg"></div>
                    
          <!-- Tampilkan tombol disini -->

            <button type="submit" class="btn btn-primary btn-sm" id="btnSimpan">Simpan Data</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- TAMPILAN Modal Form View Data -->

  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">

            <button type="button" class="btn btn-danger btn-sm px-4 fw-bold" id="confirmBtnAction">YA, HAPUS</button>
          </div>
        </div>
      </div>
    </div>
  </div>

          integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
  </script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script>
    // *************************      
    // DEKLARASI VARIABEL GLOBAL
    // **************************
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzYCPl-xlxeCM1VneFgvjcvTEAgzVSVRX2s1xDUjYeOper_eIfdavUSN_YMyl5_m_G/exec";
    let globalData = [];
    let modalInstance;
    let confirmModalInstance;
    
    document.addEventListener('DOMContentLoaded', function() {
        // Daftarkan modal utama
        const elForm = document.getElementById('formModal');
        if (elForm) modalInstance = new bootstrap.Modal(elForm);
        
        // Daftarkan modal konfirmasi
        const elConfirm = document.getElementById('confirmModal');
        if (elConfirm) confirmModalInstance = new bootstrap.Modal(elConfirm);
              
        // Registrasi Event Submit Form
        const fLogin = document.getElementById('formLogin');
        if (fLogin) fLogin.onsubmit = prosesLogin;
        
        const fKeluarga = document.getElementById('formKeluarga');
        if (fKeluarga) fKeluarga.onsubmit = simpanData;

        // Event untuk diagram
        const btnBuatDiagram   = document.getElementById('btnBuatDiagram');
        const btnDownloadPdf   = document.getElementById('btnDownloadPdf');
        const btnDownloadExcel = document.getElementById('btnDownloadExcel');
        if (btnBuatDiagram) btnBuatDiagram.onclick = generateDiagram;
        if (btnDownloadPdf) btnDownloadPdf.onclick = downloadDiagramPDF;
        if (btnDownloadExcel) btnDownloadExcel.onclick = downloadDiagramExcel;
    });

    /***********************
    * Tampilan showloader 
    ***********************/
    function showLoader(show, text = "Memproses...") {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
      document.getElementById('loaderText').innerText = text;
    }

    /*******************************
     * Fungsi untuk login aplikasi
     * *****************************/
    async function prosesLogin(e) {
    e.preventDefault();
    const user = document.getElementById('loginUsername').value;
    const pass = document.getElementById('loginPassword').value;
    const btn = e.target.querySelector('button[type="submit"]');
    
    // Spinner hanya pada tombol (Point 1)
    const textAsli = btn.innerHTML;
    btn.disabled = true;

    /********************************************* 
    * Fungsi untuk mendapatkan inisial dari nama
    **********************************************/
    function getInitials(nama) {
        if (!nama || nama === '-' || nama === '') return '?';
        const parts = nama.trim().split(' ');
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    /****************************************
     * Memuat data keluarga ke dalam tabel
     ***************************************/
    async function loadData() {
        showLoader(true, "Memuat Data Keluarga...");
        try {
            const url = `${SCRIPT_URL}?action=getData`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("Gagal menghubungi server");
            const res = await response.json();
            console.log("Raw Response:", res);
            if (res && res.data && Array.isArray(res.data)) {
                globalData = res.data;
            } else if (Array.isArray(res)) {
                globalData = res;
            } else {
                globalData = [];
            }
            // Sort data berdasarkan tglLahir (Ascending: Tua ke Muda)
            globalData.sort((a, b) => {
                const dateA = a.tglLahir ? new Date(a.tglLahir) : new Date('9999-12-31');
                const dateB = b.tglLahir ? new Date(b.tglLahir) : new Date('9999-12-31');
                return dateA - dateB;
            });
            // Buat tabel data 
            renderTable();
            console.log(`Berhasil merender ${globalData.length} baris data.`);
        } catch (error) {
            console.error("Error saat loadData:", error);
            const tbody = document.getElementById('tableBody');
            if (tbody) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center p-4"><div class="text-danger">Gagal memuat data: ${error.message}</div></td></tr>`;
            }
        } finally {
            showLoader(false);
        }
    }

    /***********************************
     * Fungsi Pencarian Data Anggota
     ***********************************/
    function cariData() {
        const keyword = document.getElementById('cariNama').value.toLowerCase().trim();
        const tbody = document.getElementById('tableBody');
        
        if (!globalData || globalData.length === 0) return;

        // Filter data berdasarkan nama
        const filteredData = globalData.filter(item => {
            const nama = (item.nama || '').toLowerCase();
            return nama.includes(keyword);
        });

        // Render ulang tabel dengan data yang sudah difilter
        renderTableFiltered(filteredData);
        
        if (filteredData.length === 0) {
            showMessage("Nama tidak ditemukan", "warning", "tableMessage");
        }
    }

    /*************************************
     * Fungsi untuk menghapus record data
     *************************************/
    function hapusData(id, nama) {
        try {
            const item = globalData.find(x => String(x.id) === String(id));
            if (!item) {
                showMessage("Data tidak ditemukan", "error", "tableMessage");
                return;
            }
            // Hapus modal dinamis jika sudah ada sebelumnya
            const existingModal = document.getElementById('dynamicConfirmModal');
            if (existingModal) {
                existingModal.remove();
            }

            // Buat modal konfirmasi dinamis (sama persis dengan viewDetail)
            const modalHtml = `
                <div class="modal fade" id="dynamicConfirmModal" tabindex="-1" aria-hidden="true" style="display:block; z-index:9999;">
                    <div class="modal-dialog modal-sm modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-body text-center p-4">
                                <div class="mb-3"><span style="font-size: 3rem;">⚠️</span></div>
                                <h5 class="fw-bold text-dark">Konfirmasi Hapus</h5>
                                <p class="small text-muted mb-4">Apakah Anda yakin ingin menghapus data "<strong>${nama}</strong>" dari sistem?</p>
                                <div class="d-flex justify-content-center gap-2">
                                    <button type="button" class="btn btn-light btn-sm px-4 fw-bold" id="confirmBatalBtn">BATAL</button>
                                    <button type="button" class="btn btn-danger btn-sm px-4 fw-bold" id="confirmHapusBtn">YA, HAPUS</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Tambahkan ke body
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            // Tampilkan modal
            const modalElement = document.getElementById('dynamicConfirmModal');
            const modal = new bootstrap.Modal(modalElement, {
                backdrop: true,
                keyboard: true
            });
            modal.show();
            // Tombol BATAL
            document.getElementById('confirmBatalBtn').onclick = function() {
                modal.hide();
                setTimeout(() => modalElement.remove(), 300);
            };

            // Tombol HAPUS
            document.getElementById('confirmHapusBtn').onclick = async function() {
                modal.hide();
                // Gunakan cara yang SAMA dengan simpanData/kirimData
                showLoader(true, "Menghapus data...");
                try {
                    const resp = await fetch(SCRIPT_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: "deleteData", id: id.toString() }) 
                    });
                    const res = await resp.json();
                    if (res.success) {
                        showMessage(`Data "${nama}" berhasil dihapus`, "success", "tableMessage");
                        setTimeout(() => modalElement.remove(), 300);
                        loadData(); // Refresh tabel
                    } else {
                        showMessage("Gagal menghapus: " + (res.message || "Unknown error"), "error", "tableMessage");
                        setTimeout(() => modalElement.remove(), 300);
                    }
                } catch (e) {
                    console.error("Error:", e);
                    showMessage("Kesalahan koneksi: " + e.message, "error", "tableMessage");
                    setTimeout(() => modalElement.remove(), 300);
                } finally {
                    showLoader(false);
                }
            };

            // Hapus modal setelah ditutup
            modalElement.addEventListener('hidden.bs.modal', function() {
                modalElement.remove();
            });
        } catch (e) {
            console.error("Error:", e);
            showMessage("Gagal menampilkan konfirmasi", "error", "tableMessage");
        }
    }

    /*********************************************
    * Fungsi untuk mendapatkan inisial dari nama
    *********************************************/  
    function getInitials(nama) {
        if (!nama || nama === '-' || nama === '') return '?';
        const parts = nama.trim().split(' ');
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    /***************************************
    * Mendapatkan tahun lahir dari tglLahir
    ****************************************/
    function getBirthYear(tglLahir) {
        if (!tglLahir) return '';
        try {
            const date = new Date(tglLahir);
            return date.getFullYear();
        } catch(e) {
            return '';
        }
    }

    /********************************************
    * Mendapatkan foto atau avatar untuk diagram
    *********************************************/
    function getFotoForDiagram(item) {
        const initials = getInitials(item.nama);
        const birthYear = getBirthYear(item.tglLahir);
        
        if (item.foto && item.foto.includes('http')) {
            return `<img src="${item.foto}" class="diagram-foto" onerror="this.onerror=null; this.parentElement.innerHTML=this.parentElement.innerHTML='<div class=\'diagram-avatar\'>${initials}</div><div class=\'diagram-name\'>${item.nama || '-'}</div><div class=\'diagram-year\'>${birthYear}</div>';">`;
        } else {
            return `<div class="diagram-avatar">${initials}</div>`;
        }
    }

    /***********************************************************
    * Render Diagram: Pasangan Selevel, Anak di Bawah (Rekursif)
    ************************************************************/
    function renderTreeDiagram(node) {
        if (!node) return '';
        const getYear = (dateStr) => {
            if (!dateStr) return '';
            try { return new Date(dateStr).getFullYear(); }
            catch(e) { return ''; }
        };

        const renderFoto = (person) => {
            const initials = getInitials(person.nama);
            if (person.foto && person.foto.includes('http')) {
                return `<img src="${person.foto}" class="diagram-foto" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'diagram-avatar\'>${initials}</div>';">`;
            } else {
                return `<div class="diagram-avatar">${initials}</div>`;
            }
        };

        // Node Suami
        const suamiHtml = `
            <div class="diagram-node">
                ${renderFoto(node)}
                <div class="diagram-name">${node.nama || '-'}</div>
                <div class="diagram-year">${getYear(node.tglLahir)}</div>
            </div>
        `;

        let istriHtml = '';
        if (node.spouse && node.spouse.nama) {
            istriHtml = `
                <div class="diagram-node">
                    ${renderFoto(node.spouse)}
                    <div class="diagram-name">${node.spouse.nama || '-'}</div>
                    <div class="diagram-year">${getYear(node.spouse.tglLahir)}</div>
                </div>
            `;
        }

        // tentukan simbol berdasarkan status kawin = "+"  dan cerai="x"
        let connectorSymbol = '+';
        if (node.statusKawin && node.statusKawin.toLowerCase() === 'cerai') {
            connectorSymbol = 'x';
        }
        const coupleHtml = `
            <div class="couple-group">
                ${suamiHtml}
                ${istriHtml ? `<div class="couple-connector">${connectorSymbol}</div>${istriHtml}` : ''}
            </div>
        `;

        // Jika tidak punya anak
        if (!node.children || node.children.length === 0) {
            return `<div class="family-node">${coupleHtml}</div>`;
        }

        // Proses anak-anak secara rekursif
        let childrenHtml = '';
        node.children.forEach(child => {
            childrenHtml += renderTreeDiagram(child);
        });
        // Bungkus dengan container khusus untuk garis "⊥"
        return `
            <div class="family-node">
                ${coupleHtml}
                <div class="children-connector">
                    <div class="children-wrapper">
                        ${childrenHtml}
                    </div>
                </div>
            </div>
        `;
    }

    /*********************************************************
    * Buka modal diagram (dinamis - sama seperti viewDetail)
    **********************************************************/
    function openDiagram() {
        try {
            // Hapus modal dinamis jika sudah ada sebelumnya
            const existingModal = document.getElementById('dynamicDiagramModal');
            if (existingModal) {
                existingModal.remove();
            }
            
            // Ambil daftar unik Nama Ayah dari field "ayah" di database
            const ayahSet = new Set();
            if (globalData && globalData.length > 0) {
                globalData.forEach(item => {
                    if (item.ayah && item.ayah.trim() !== '') {
                        ayahSet.add(item.ayah.trim());
                    }
                });
            }
            
            // Konversi ke array dan urutkan
            const ayahList = Array.from(ayahSet).sort();
            
            // Isi dropdown options dari daftar Ayah
            let dropdownOptions = '<option value="">-- Pilih Keluarga (Nama Ayah) --</option>';
            ayahList.forEach(ayah => {
                // Gunakan nilai asli, hindari karakter kutip bermasalah
                const safeAyah = ayah.replace(/"/g, '&quot;');
                dropdownOptions += `<option value="${safeAyah}">${ayah}</option>`;
            });
            
            // Jika tidak ada data ayah, beri pesan
            if (ayahList.length === 0) {
                dropdownOptions = '<option value="">-- Tidak ada data ayah --</option>';
            }
            
            // Buat modal diagram dinamis
            const modalHtml = `
                <div class="modal fade" id="dynamicDiagramModal" tabindex="-1" aria-hidden="true" style="display:block; z-index:9999;">
                    <div class="modal-dialog modal-xl modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header bg-primary text-white">
                                <h5 class="modal-title">Buat Diagram Pohon</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row mb-3">
                                    <div class="col-md-12 d-flex gap-2 align-items-center flex-wrap">
                                        <select id="pilihNamaDiagram" class="form-select" style="flex:2; min-width:250px;">
                                            ${dropdownOptions}
                                        </select>
                                        <button class="btn btn-primary btn-sm"id="btnBuatDiagram" title="Buat Diagram">
                                            <i class="fas fa-sitemap"></i> Silsilah
                                        </button>
                                        <button class="btn btn-outline-primary btn-sm" id="btnDownloadPdf" title="Download PDF">
                                            <i class="fas fa-file-pdf"></i> PDF
                                        </button>
                                        <button class="btn btn-outline-secondary btn-sm" id="btnDownloadExcel" title="Download Excel">
                                            <i class="fas fa-file-excel"></i> Excel
                                        </button>
                                    </div>
                                </div>
                                <div id="diagramContainer" style="min-height: 450px; max-height: 550px; overflow: auto; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                                    <div class="text-center text-muted p-5">Silakan pilih keluarga (Nama Ayah) dan klik tombol Diagram</div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Tutup</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Tambahkan ke body
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            // Tampilkan modal
            const modalElement = document.getElementById('dynamicDiagramModal');
            const modal = new bootstrap.Modal(modalElement, {
                backdrop: true,
                keyboard: true
            });
            modal.show();
            
            // Hapus modal setelah ditutup
            modalElement.addEventListener('hidden.bs.modal', function() {
                modalElement.remove();
            });
            
            // Event listener untuk tombol Diagram
            const btnBuat = document.getElementById('btnBuatDiagram');
            if (btnBuat) {
                btnBuat.onclick = function() {
                    generateDiagram();
                };
            }
            
            // Event listener untuk tombol PDF
            const btnPdf = document.getElementById('btnDownloadPdf');
            if (btnPdf) {
                btnPdf.onclick = function() {
                    downloadDiagramPDF();
                };
            }
            
            // Event listener untuk tombol Excel
            const btnExcel = document.getElementById('btnDownloadExcel');
            if (btnExcel) {
                btnExcel.onclick = function() {
                    downloadDiagramExcel();
                };
            }
            
        } catch (e) {
            console.error("Error openDiagram:", e);
            showMessage("Gagal membuka diagram: " + e.message, "error", "tableMessage");
        }
    }

    /************************************************
    * Membangun struktur tree berdasarkan Nama Ayah
    *************************************************/
    function buildFamilyTreeByAyah(ayahName) {
        if (!ayahName) return null;
        const normalize = (str) => (str || "").toLowerCase().trim().replace(/\s+/g, " ");
        const targetNorm = normalize(ayahName);
        // Cari apakah ada data untuk ayah ini
        let ayahRecord = null;
        for (let item of globalData) {
            if (normalize(item.nama) === targetNorm) {
                ayahRecord = item;
                break;
            }
        }
        // Jika tidak ada, buat node virtual untuk ayah
        let ayahData;
        if (ayahRecord) {
            ayahData = { ...ayahRecord };
        } else {
            ayahData = {
                id: `virtual-${Date.now()}`,
                nama: ayahName,
                jk: "pria",
                tglLahir: "",
                foto: "",
                namaPasangan: "",
                statusKeluarga: "Kepala Keluarga",
                alamat: "", kota: "", ayah: "", ibu: ""
            };
        }
        // Cari pasangan ayah (istri), cari dari data yang memiliki namaPasangan = ayahName
        let spouse = null;
        for (let item of globalData) {
            if (normalize(item.namaPasangan) === targetNorm && item.id !== ayahData.id) {
                spouse = item;
                break;
            }
        }
        // Cari semua anak dari ayah ini
        const anakList = [];
        for (let item of globalData) {
            if (normalize(item.ayah) === targetNorm && item.id !== ayahData.id) {
                anakList.push(item);
            }
        }
        // Bangun node untuk setiap anak dan cucu
        const anakNodes = anakList.map(anak => {
            // Cari pasangan anak (menantu)
            let anakSpouse = null;
            for (let item of globalData) {
                if (normalize(item.nama) === normalize(anak.namaPasangan) && item.id !== anak.id) {
                    anakSpouse = item;
                    break;
                }
            }
            // Cari cucu (anak dari anak ini)
            const cucuList = [];
            for (let item of globalData) {
                if ((normalize(item.ayah) === normalize(anak.nama) || normalize(item.ibu) === normalize(anak.nama)) && item.id !== anak.id) {
                    cucuList.push(item);
                }
            }
            const cucuNodes = cucuList.map(cucu => {
                let cucuSpouse = null;
                for (let item of globalData) {
                    if (normalize(item.nama) === normalize(cucu.namaPasangan) && item.id !== cucu.id) {
                        cucuSpouse = item;
                        break;
                    }
                }
                return { ...cucu, spouse: cucuSpouse, children: [] };
            });
            return { ...anak, spouse: anakSpouse, children: cucuNodes };
        });
        return { ...ayahData, spouse: spouse, children: anakNodes };
    }

    /**************************************************************************
    * Generate Diagram (memanggil buildFamilyTreeByAyah dan renderTreeDiagram)
    ***************************************************************************/
    function generateDiagram() {
        const selectEl = document.getElementById('pilihNamaDiagram');
        if (!selectEl) {
            showMessage("Error: Dropdown tidak ditemukan", "error", "tableMessage");
            return;
        }
        const selectedValue = selectEl.value;
        if (!selectedValue) {
            showMessage("Silakan pilih keluarga (Nama Ayah) terlebih dahulu!", "warning", "tableMessage");
            return;
        }
        showLoader(true, "Membuat diagram pohon...");
        try {
            const rootNode = buildFamilyTreeByAyah(selectedValue);
            const container = document.getElementById('diagramContainer');
            
            if (container) {
                if (rootNode) {
                    const treeHtml = `
                        <div class="tree-diagram">
                            <ul class="tree-root">
                                ${renderTreeDiagram(rootNode)}
                            </ul>
                        </div>
                    `;
                    container.innerHTML = treeHtml;
                    showMessage("Diagram berhasil dibuat", "success", "tableMessage");
                } else {
                    container.innerHTML = `<div class="text-center text-danger p-5">
                        <i class="fas fa-exclamation-triangle"></i> Tidak dapat membangun diagram pohon untuk keluarga yang dipilih.<br>
                        Pastikan data dengan nama "${selectedValue}" tersedia sebagai seorang Ayah di database.
                    </div>`;
                    console.warn("Gagal build tree untuk:", selectedValue);
                }
            }
        } catch (err) {
            console.error("Error generateDiagram:", err);
            showMessage("Gagal membuat diagram: " + err.message, "error", "tableMessage");
        } finally {
            showLoader(false);
        }
    }

    /***********************
    * Download sebagai PDF
    ************************/
    function downloadDiagramPDF() {
        const container = document.getElementById('diagramContainer');
        if (!container || container.innerHTML.includes('Silakan pilih') || container.innerHTML.includes('Tidak dapat membangun')) {
            showMessage("Tidak ada diagram untuk diunduh. Buat diagram terlebih dahulu.", "warning", "tableMessage");
            return;
        }
        
        showLoader(true, "Menyiapkan PDF...");
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: 'pohon_silsilah.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, logging: false },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        
        html2pdf().set(opt).from(container).save().then(() => {
            showLoader(false);
            showMessage("PDF berhasil diunduh", "success", "tableMessage");
        }).catch(err => {
            console.error("PDF Error:", err);
            showLoader(false);
            showMessage("Gagal membuat PDF: " + err.message, "error", "tableMessage");
        });
    }

    /**************************
    * Download sebagai Excel
    ***************************/
    function downloadDiagramExcel() {
        if (!globalData || globalData.length === 0) {
            showMessage("Tidak ada data untuk diekspor", "warning", "tableMessage");
            return;
        }
        showLoader(true, "Menyiapkan Excel...");
        try {
            const excelData = globalData.map(item => ({
                'ID': item.id,
                'Nama': item.nama,
                'Jenis Kelamin': item.jk,
                'Tanggal Lahir': item.tglLahir ? new Date(item.tglLahir).toLocaleDateString('id-ID') : '-',
                'Status Kawin': item.statusKawin,
                'Nama Pasangan': item.namaPasangan,
                'Status Keluarga': item.statusKeluarga,
                'Ayah': item.ayah,
                'Ibu': item.ibu,
                'Alamat': item.alamat,
                'Kota': item.kota
            }));
            
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data Keluarga");
            XLSX.writeFile(wb, "data_keluarga.xlsx");
            
            showLoader(false);
            showMessage("File Excel berhasil diunduh", "success", "tableMessage");
        } catch (error) {
            console.error("Excel Error:", error);
            showLoader(false);
            showMessage("Gagal membuat Excel: " + error.message, "error", "tableMessage");
        }
    }

    * Fungsi Untuk logout dari aplikasi

      location.reload();

    /*****************************************
    * Fungsi untuk cek logika status almarhum
    ******************************************/
    function toggleWafat() {
    const wafatSelect = document.getElementById('wafat');
    const divTglWafat = document.getElementById('divTglWafat');
    const tglWafatInput = document.getElementById('tglWafat');
        if (wafatSelect?.value === 'ya') {
            if (divTglWafat) divTglWafat.style.display = 'flex';
            if (tglWafatInput) tglWafatInput.required = true;
        } else {
            if (divTglWafat) divTglWafat.style.display = 'none';
            if (tglWafatInput) {
                tglWafatInput.value = '';
                tglWafatInput.required = false;
            }
        }
    }
        
    /**************************************
    * Fungsi untuk Logika Kondisi Pasangan
    ***************************************/
    function togglePasangan() {
        const jk = document.getElementById('jk').value;
        const statusKawin = document.getElementById('statusKawin').value;
        const divPasangan = document.getElementById('divPasangan');
        
        // Cek apakah elemen input namaPasangan sudah ada
        let namaPasanganInput = document.getElementById('namaPasangan');
        
        // Jika belum ada, buat sekarang
        if (!namaPasanganInput) {
            // Buat struktur input group
            const inputGroup = document.createElement('div');
            inputGroup.className = 'input-group';
            const span = document.createElement('span');
            span.className = 'input-group-text';
    
            const icon = document.createElement('i');
            icon.className = jk === "pria" ? "fa fa-female" : "fa fa-male";
            icon.style.fontSize = jk === "pria" ? "21px" : "24px";
            span.appendChild(icon);
    
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'namaPasangan';
            input.className = 'form-control';
            input.placeholder = jk === "pria" ? "Input nama istri anda" : "Input nama suami anda";
            input.maxLength = 40;
            input.pattern = "[A-Za-z ]+";
            
            inputGroup.appendChild(span);
            inputGroup.appendChild(input);
            divPasangan.innerHTML = '';
            divPasangan.appendChild(inputGroup);
            namaPasanganInput = input;
        } else {
            // Update placeholder dan icon jika perlu
            const span = namaPasanganInput.previousElementSibling;
            const icon = span.querySelector('i');
            if (jk === "pria") {
                icon.className = "fa fa-female";
                namaPasanganInput.placeholder = "Input nama istri anda";
            } else {
                icon.className = "fa fa-male";
                namaPasanganInput.placeholder = "Input nama suami anda";
            }
        }
        // Tentukan apakah akan ditampilkan
        let show = false;
        if (jk === "pria" && (statusKawin === "kawin" || statusKawin === "cerai")) {
            show = true;
        } else if (jk === "wanita" && (statusKawin === "kawin" || statusKawin === "cerai")) {
            show = true;
        }
        divPasangan.style.display = show ? "flex" : "none";
    }
    
    /***************************
     * Update file upload foto 
     **************************/
    function updateFileName(input) {
        const label = document.getElementById('fotoLabel');
        if (input.files && input.files.length > 0) {
            label.value = input.files[0].name;
            label.classList.remove('text-muted');
        } else {
            label.value = 'Tidak ada file terpilih';
            label.classList.add('text-muted');
        }
    }

    /*****************************************************************
     * Fungsi Pesan General
     * @param {string} msg - Teks pesan
     * @param {string} type - success, error, warning, info
     * @param {string} elementId - ID element tempat menampilkan pesan
     ******************************************************************/
    function showMessage(msg, type = 'info', elementId = 'formMessage') {
        const el = document.getElementById(elementId);
        if (!el) return;
        // Mapping Ikon
        const icons = {
           success: '<i class="fas fa-check-circle"></i>',
           error: '<i class="fas fa-exclamation-circle"></i>',
           warning: '<i class="fas fa-exclamation-triangle"></i>',
           info: '<i class="fas fa-info-circle"></i>'
        };
        el.className = `form-msg msg-${type}`;
        el.innerHTML = `<span>${icons[type] || ''}</span> <span>${msg}</span>`;
        el.style.display = 'flex';
        // Sembunyikan otomatis dalam 5 detik
        setTimeout(() => {
            el.style.display = 'none';
        }, 5000);
    }
