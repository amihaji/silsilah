<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Silsilah Keluarga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --dark-blue: #1A365D; --light-blue: #63B3ED; --light-gray: #EDF2F7; } 
    body { background-color: var(--light-gray); font-family: 'Segoe UI', sans-serif; }
    .navbar { background-color: var(--dark-blue) !important; }
    /* Tampilan  Foto Pada Tabel Data Kelauarga */
    .foto-thumb { 
      width: 50px; 
      height: 50px; 
      object-fit: cover; 
      border-radius: 50%; 
      border: 2px solid var(--light-blue); 
    }
    .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction: column; }
    .btn-round { 
      width: 32px; height: 32px; border-radius: 50%; 
      display: inline-flex; align-items: center; justify-content: center; 
      padding: 0; border: 1px solid #dee2e6; background: white; transition: 0.2s;
    }
    .btn-round:hover { background-color: #f0f0f0 !important; color: #000 !important; }
    .btn-view { color: #0d6efd; }
    .btn-edit { color: #ffc107; }
    .btn-delete { color: #dc3545; }
    /* Tampilan Foto Untuk Detail Data Keluarga */
    .view-photo { 
      width: 150px; 
      height: 150px; 
      object-fit: cover; 
      border-radius: 8px; 
      border: 3px solid var(--light-blue);
    }

    /* Header biru terang untuk semua panel/modal */
    .card-header, .modal-header {
        background-color: #007bff !important;
        color: white !important;
    }
    .modal-header .btn-close {
        filter: brightness(0) invert(1); /* Membuat tombol close jadi putih */
    }
    /* Override untuk memastikan modal tampil */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1055;
    }
    .modal.show {
        display: block !important;
    }
    .modal-backdrop {
        z-index: 1050;
    }

    /* Styling Pesan (Alert Custom) */
    .form-msg {
        display: none;
        padding: 10px 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .msg-success { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .msg-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .msg-warning { background-color: #fff3cd; color: #fdbf04; border: 1px solid #ffecb5; }
    .msg-info { background-color: #cff4fc; color: #055160; border: 1px solid #b6effb; }

  </style>
</head>
<body>

  <!-- Indikator Loading -->
  <div class="loading-overlay" id="loader">
    <div class="spinner-border text-primary mb-2"></div>
    <div id="loaderText">Memproses...</div>
  </div>

  <!-- Area Login -->
  <div id="loginArea" class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-header bg-primary text-white text-center"><h4>Login Silsilah</h4></div>
          <div class="card-body">
            <form id="formLogin">
              <div class="mb-3"><label>Username</label><input type="text" id="loginUsername" class="form-control" required></div>
              <div class="mb-3"><label>Password</label><input type="password" id="loginPassword" class="form-control" required></div>
              <!-- Tampilkan pesan diatas tombol -->
              <div id="formMessage" class="form-msg"></div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Area Aplikasi -->
  <div id="appArea" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Pohon Silsilah Keluarga</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>
   
      <!-- TAMBAHKAN BARIS INI: Tempat pesan untuk aksi di tabel (Hapus) -->
      <div id="tableMessage" class="form-msg"></div>

      <div class="card p-3 shadow-sm">
        <div class="d-flex justify-content-between mb-3 align-items-center">
          <h5 class="m-0">Data Anggota Keluarga</h5>
          <button class="btn btn-success btn-sm" onclick="openForm('add')">+ Tambah</button>
        </div>
       

        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Foto</th>
                <th>Nama</th>
                <th>Status Kawin</th>
                <th>Nama Pasangan</th>
                <th>Status Keluarga</th>
                <th>Nama Ayah</th>
                <th>Nama Ibu</th>
                <th class="text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
  </div>

  <!-- Modal Form Anggota -->
  <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="formKeluarga">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Tambah Data</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="formId">
            <input type="hidden" id="fotoLama">
            <div class="row g-3">
              <div class="col-md-12">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" id="nama" class="form-control" required>
              </div>
              <div class="col-md-12">
                <label class="form-label">Tanggal Lahir</label>
                <input type="date" id="tglLahir" class="form-control">
              </div>
              <div class="col-md-12">
                <label class="form-label">Jenis Kelamin</label>
                <select id="jk" onchange="togglePasangan()">
                  <option value="Laki-laki">Laki-laki</option>
                  <option value="Perempuan">Perempuan</option>
                </select>
              </div>
              <div class="col-md-12">
                <label class="form-label">Status Perkawinan</label>
                <select id="statusKawin" onchange="togglePasangan()">  
                  <option value="Single">Single</option>
                  <option value="Kawin">Kawin</option>
                  <option value="Duda">Duda</option>
                  <option value="Janda">Janda</option>
                </select>
              </div>

              <div class="col-md-12" id="divPasangan" style="display:none;">
                <label class="form-label" id="labelPasangan">Nama Pasangan</label>
                <input type="text" id="namaPasangan" class="form-control form-control-sm">
              </div>

              <div class="col-md-12">
                <label class="form-label">Status Keluarga</label>
                <select id="statusKeluarga" class="form-select">
                  <option value="Suami">Suami</option>
                  <option value="Istri">Istri</option>
                  <option value="Anak">Anak</option>
                </select>
              </div>
              <div class="col-md-12">
                <label class="form-label">Alamat Lengkap</label>
                <textarea id="alamat" class="form-control" rows="2"></textarea>
              </div>
              <div class="col-md-12">
                <label class="form-label">Kota</label>
                <input type="text" id="kota" class="form-control">
              </div>
              <div class="col-md-12">
                <label class="form-label">Nama Ayah</label>
                <input type="text" id="ayah" class="form-control">
              </div>
              <div class="col-md-12">
                <label class="form-label">Nama Ibu</label>
                <input type="text" id="ibu" class="form-control">
              </div>
              <div class="col-md-12">
                <label class="form-label">Unggah Foto</label>
                <input type="file" id="fotoFile" class="form-control" accept="image/*">
              </div>
            </div>
          </div>
          <!-- Tampilkan pesan diatas tombol -->
          <div id="formMessage" class="form-msg">
          
          <!-- Tampilkan tombol disini -->
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="submit" class="btn btn-primary" id="btnSimpan">Simpan Data</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Form View Data -->
  <div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-light">
          <h5 class="modal-title">Detail Profil Keluarga</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row" id="viewContent">
            <!-- Diisi via JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL KONFIRMASI CUSTOM -->
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-body text-center p-4">
          <div class="mb-3"><span style="font-size: 3rem;">⚠️</span></div>
          <h5 id="confirmTitle" class="fw-bold text-dark">Konfirmasi</h5>
          <p id="confirmText" class="small text-muted mb-4"></p>
          <div class="d-flex justify-content-center gap-2">
            <button type="button" class="btn btn-light btn-sm px-4 fw-bold" data-bs-dismiss="modal">BATAL</button>
            <button type="button" class="btn btn-danger btn-sm px-4 fw-bold" id="confirmBtnAction">YA, HAPUS</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    
    // *************************      
    // DEKLARASI VARIABEL GLOBAL
    // **************************
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyU1c4SDzZE01shia9jBAEwVNnm7K_41T6owNrVZvVGnWSB1u3nbkDMREn5uYNRftFo/exec";
    let globalData = [];
    let modalInstance;
    let confirmModalInstance;

    document.addEventListener('DOMContentLoaded', function() {
        // Daftarkan modal utama
        const elForm = document.getElementById('formModal');
        if (elForm) modalInstance = new bootstrap.Modal(elForm);
        
        // Daftarkan modal konfirmasi
        const elConfirm = document.getElementById('confirmModal');
        if (elConfirm) confirmModalInstance = new bootstrap.Modal(elConfirm);
        
        // HAPUS pendaftaran viewModalInstance - tidak perlu
        
        // Registrasi Event Submit Form
        const fLogin = document.getElementById('formLogin');
        if (fLogin) fLogin.onsubmit = prosesLogin;
        
        const fKeluarga = document.getElementById('formKeluarga');
        if (fKeluarga) fKeluarga.onsubmit = simpanData;
    });
    /***********************
     * Tampilan showloader 
     ***********************/
    function showLoader(show, text = "Memproses...") {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
      document.getElementById('loaderText').innerText = text;
    }

    /*******************************
     * Fungsi untuk login aplikasi
     * *****************************/
    async function prosesLogin(e) {
    e.preventDefault();
    const user = document.getElementById('loginUsername').value;
    const pass = document.getElementById('loginPassword').value;
    const btn = e.target.querySelector('button[type="submit"]');
    
    // Spinner hanya pada tombol (Point 1)
    const textAsli = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';

    try {
      const resp = await fetch(`${SCRIPT_URL}?action=login&u=${user}&p=${pass}`);
      const res = await resp.json();
        if (res.success) {
            document.getElementById('loginArea').classList.add('d-none');
            document.getElementById('appArea').classList.remove('d-none');
            loadData();
        } else {
            //alert(res.message);
            showMessage(res.message, "error");
        }
      } catch (err) {
          //alert("Gagal terhubung ke server");
          showMessage("Gagal terhubung ke serrver : " + err.message, "error");
      } finally {
          btn.disabled = false;
          btn.innerHTML = textAsli;
      }
    }

    /****************************
     * Buat Tabel Data Keluarga
     * **************************/
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (!tbody) return;
      tbody.innerHTML = '';
      
      if (!globalData || globalData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Data tidak ditemukan atau kosong.</td></tr>';
        return;
      }

      globalData.forEach(item => {
        const img = (item.foto && item.foto.includes('http')) ? item.foto : '[https://via.placeholder.com/50?text=No+Foto](https://via.placeholder.com/50?text=No+Foto)';
        
        tbody.innerHTML += `
          <tr>
            <td><img src="${img}" class="foto-thumb" onerror="this.src='[https://via.placeholder.com/50](https://via.placeholder.com/50)'"></td>
            <td><strong>${item.nama || '-'}</strong></td>
            <td>${item.statusKawin || '-'}</td>
            <td>${item.namaPasangan || '-'}</td>
            <td>${item.statusKeluarga || '-'}</td>
            <td>${item.ayah || '-'}</td>
            <td>${item.ibu || '-'}</td>
            <td class="text-center">
              <div class="d-flex justify-content-center gap-1">
                <button class="btn-round btn-view" onclick="viewDetail('${item.id}')" title="View">👁</button>
                <button class="btn-round btn-edit" onclick="openForm('edit', '${item.id}')" title="Edit">✎</button>
                <button class="btn-round btn-delete" onclick="hapusData('${item.id}', '${item.nama}')" title="Hapus">✖</button>
              </div>
            </td>
          </tr>`;
      });
    }
 
    /**********************************************************
     * Untuk tampilkan form Tambah dan Edit
     * Mengubah judul dan aktifkan kembali tombol simpan
     *********************************************************/
    function openForm(mode, id = null) {
    const form = document.getElementById('formKeluarga');
    if (form) form.reset();
    
    document.getElementById('formId').value = "";
    document.getElementById('formMessage').style.display = 'none';
    
    // Reset Tombol Simpan agar tidak disabled (Fix Hang)
    const btn = document.getElementById('btnSimpan');
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = 'Simpan Data';
    }

    // Update Judul Modal (Fix Point 2.2 menggunakan id="modalTitle")
    const titleEl = document.getElementById('modalTitle');
    if (titleEl) {
        titleEl.innerText = (mode === 'edit') ? "Edit Data Keluarga" : "Tambah Data Keluarga";
    }

    if (mode === 'edit' && id) {
        const item = globalData.find(x => x.id == id);
        if (item) {
            document.getElementById('formId').value = item.id;
            document.getElementById('nama').value = item.nama || "";
            document.getElementById('jk').value = item.jk || "Laki-laki";
            document.getElementById('tglLahir').value = item.tglLahir ? new Date(item.tglLahir).toISOString().split('T')[0] : "";
            document.getElementById('statusKawin').value = item.statusKawin || "Single";
            document.getElementById('namaPasangan').value = item.namaPasangan || "";
            document.getElementById('statusKeluarga').value = item.statusKeluarga || "Anak";
            document.getElementById('alamat').value = item.alamat || "";
            document.getElementById('kota').value = item.kota || "";
            document.getElementById('ayah').value = item.ayah || "";
            document.getElementById('ibu').value = item.ibu || "";
            document.getElementById('fotoLama').value = item.foto || "";
            if (typeof togglePasangan === 'function') togglePasangan();
        }
    }
    modalInstance.show();
    }


    /******************************
     * Update simpan Data di sheet
    *******************************/
    async function simpanData(e) {
        if (e) e.preventDefault(); // Mencegah reload halaman (PENTING)
        
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Memproses...';
        
        document.getElementById('formMessage').style.display = 'none';

        try {
            let payload = {
                action: "saveData",
                data: {
                    id: document.getElementById('formId').value,
                    nama: document.getElementById('nama').value,
                    jk: document.getElementById('jk').value,
                    tglLahir: document.getElementById('tglLahir').value,
                    statusKawin: document.getElementById('statusKawin').value,
                    namaPasangan: document.getElementById('namaPasangan').value,
                    statusKeluarga: document.getElementById('statusKeluarga').value,
                    alamat: document.getElementById('alamat').value,
                    kota: document.getElementById('kota').value,
                    ayah: document.getElementById('ayah').value,
                    ibu: document.getElementById('ibu').value,
                    fotoLama: document.getElementById('fotoLama').value,
                    fotoBase64: null
                }
            };

            const fileInput = document.getElementById('fotoFile');
            if (fileInput && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(event) {
                    payload.data.fotoBase64 = event.target.result;
                    await kirimData(payload); // Nama fungsi tetap sesuai REV4
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                await kirimData(payload); // Nama fungsi tetap sesuai REV4
            }
        } catch (err) {
            showMessage("Error: " + err.message, "error", "formMessage");
            const btnReset = document.getElementById('btnSimpan');
            btnReset.disabled = false;
            btnReset.innerHTML = 'Simpan Data';
        }
    }

    /*************************************
     * Mengembalikan status tombol simpan
     *************************************/
    function resetSimpanButton() {
    const btn = document.getElementById('btnSimpan');
      if (btn) {
          btn.disabled = false;
          btn.innerHTML = 'SIMPAN DATA';
      }
    }

    async function loadData() {
    showLoader(true, "Memuat Data Keluarga...");
    
      try {
          // PERBAIKAN: Ganti readData menjadi getData
          const url = `${SCRIPT_URL}?action=getData`;
          const response = await fetch(url);
          
          if (!response.ok) throw new Error("Gagal menghubungi server");
          
          const res = await response.json();
          
          console.log("Raw Response:", res);

          if (res && res.data && Array.isArray(res.data)) {
              globalData = res.data;
          } else if (Array.isArray(res)) {
              globalData = res;
          } else {
              globalData = [];
          }

          // Render tabel sama seperti kode Anda yang sudah ada
          const tbody = document.getElementById('tableBody');
          if (!tbody) return;

          tbody.innerHTML = '';

          if (globalData.length === 0) {
              tbody.innerHTML = `<tr><td colspan="8" class="text-center p-4"><div class="text-muted">Tidak ada data ditemukan di database</div></td></tr>`;
              return;
          }

          globalData.forEach((item, index) => {
              const tr = document.createElement('tr');
              const itemId = item.id ? String(item.id) : '';
              const itemNama = item.nama ? item.nama.replace(/'/g, "\\'") : 'Tanpa Nama';

              tr.innerHTML = `
                  <td class="text-center">
                      <img src="${item.foto || 'https://via.placeholder.com/50'}" 
                          class="foto-thumb" 
                          onerror="this.src='https://via.placeholder.com/50'">
                  </td>
                  <td>${item.nama || '-'}</td>
                  <td>${item.statusKawin || '-'}</td>
                  <td>${item.namaPasangan || '-'}</td>
                  <td>${item.statusKeluarga || '-'}</td>
                  <td>${item.ayah || '-'}</td>
                  <td>${item.ibu || '-'}</td>
                  <td class="text-center">
                      <div class="btn-group btn-group-sm">
                          <button type="button" class="btn btn-info text-white" onclick="viewDetail('${itemId}')">👁️</button>
                          <button type="button" class="btn btn-warning text-white" onclick="openForm('edit', '${itemId}')">✏️</button>
                          <button type="button" class="btn btn-danger" onclick="hapusData('${itemId}', '${itemNama}')">🗑️</button>
                      </div>
                  </td>
              `;
              tbody.appendChild(tr);
          });

          console.log(`Berhasil merender ${globalData.length} baris data.`);

      } catch (error) {
          console.error("Error:", error);
          const tbody = document.getElementById('tableBody');
          if (tbody) {
              tbody.innerHTML = `<tr><td colspan="8" class="text-center p-4"><div class="text-danger">Gagal memuat data: ${error.message}</div></td></tr>`;
          }
      } finally {
          showLoader(false);
      }
    }

    /**********************************
     *  Menampilkan Data Secara Detail
     * ********************************/
    function viewDetail(id) {
      try {
          const item = globalData.find(x => String(x.id) === String(id));
          if (!item) {
              showMessage("Data tidak ditemukan", "error", "tableMessage");
              return;
          }

          // Hapus modal dinamis jika sudah ada sebelumnya
          const existingDynamicModal = document.getElementById('dynamicViewModal');
          if (existingDynamicModal) {
              existingDynamicModal.remove();
          }

          // Buat struktur modal baru
          const modalHtml = `
              <div class="modal fade" id="dynamicViewModal" tabindex="-1" aria-hidden="true" style="display:block; z-index:9999;">
                  <div class="modal-dialog modal-lg modal-dialog-centered">
                      <div class="modal-content">
                          <div class="modal-header bg-primary text-white">
                              <h5 class="modal-title">Detail Profil Keluarga</h5>
                              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                          </div>
                          <div class="modal-body">
                              <div class="row">
                                  <div class="col-md-4 text-center mb-3">
                                      <img src="${item.foto || 'https://via.placeholder.com/150'}" 
                                          class="img-fluid rounded border shadow-sm" 
                                          style="max-height:200px; width:auto; object-fit:cover;" 
                                          onerror="this.src='https://via.placeholder.com/150'">
                                  </div>
                                  <div class="col-md-8">
                                      <table class="table table-sm table-borderless">
                                          <tr><th width="35%">Nama Lengkap</th><td>: ${item.nama || '-'}</td></tr>
                                          <tr><th>Jenis Kelamin</th><td>: ${item.jk || '-'}</td></tr>
                                          <tr><th>Tgl Lahir</th><td>: ${item.tglLahir ? new Date(item.tglLahir).toLocaleDateString('id-ID') : '-'}</td></tr>
                                          <tr><th>Status Kawin</th><td>: ${item.statusKawin || '-'}</td></tr>
                                          <tr><th>Nama Pasangan</th><td>: ${item.namaPasangan || '-'}</td></tr>
                                          <tr><th>Status Keluarga</th><td>: ${item.statusKeluarga || '-'}</td></tr>
                                          <tr><th>Nama Ayah</th><td>: ${item.ayah || '-'}</td></tr>
                                          <tr><th>Nama Ibu</th><td>: ${item.ibu || '-'}</td></tr>
                                          <tr><th>Alamat</th><td>: ${item.alamat || '-'}</td></tr>
                                          <tr><th>Kota</th><td>: ${item.kota || '-'}</td></tr>
                                      </table>
                                  </div>
                              </div>
                          </div>
                        </div>
                  </div>
              </div>
          `;

          // Tambahkan ke body
          document.body.insertAdjacentHTML('beforeend', modalHtml);

          // Tampilkan modal menggunakan Bootstrap
          const modalElement = document.getElementById('dynamicViewModal');
          const modal = new bootstrap.Modal(modalElement, {
              backdrop: true,
              keyboard: true
          });
          modal.show();

          // Hapus modal setelah ditutup
          modalElement.addEventListener('hidden.bs.modal', function() {
              modalElement.remove();
          });

      } catch (e) {
          console.error("View Error:", e);
          showMessage("Gagal menampilkan detail", "error", "tableMessage");
      }
    }

    /**
     * REVISI: Fungsi hapusData
     * Fokus: Menggunakan id="confirmModal" dan memastikan aksi tombol (Fix Hang)
     */
    function hapusData(id, nama) {
        try {
            const title = document.getElementById('confirmTitle');
            const text = document.getElementById('confirmText');
            if (title) title.innerText = "KONFIRMASI HAPUS";
            if (text) text.innerText = `Apakah Anda yakin ingin menghapus data "${nama}" dari sistem?`;

            const btnAction = document.getElementById('confirmBtnAction');
            if (btnAction) {
                btnAction.onclick = async function() {
                    const confirmEl = document.getElementById('confirmModal');
                    if (confirmEl) {
                        const myModal = bootstrap.Modal.getOrCreateInstance(confirmEl);
                        myModal.hide();
                    }
                    
                    showLoader(true, "Menghapus data...");
                    try {
                        const resp = await fetch(SCRIPT_URL, { 
                            method: 'POST', 
                            body: JSON.stringify({ action: "deleteData", id: id }) 
                        });
                        const res = await resp.json();
                        if (res.success) {
                            showMessage(`Data "${nama}" berhasil dihapus`, "success", "tableMessage");
                            loadData();
                        } else {
                            showMessage("Gagal: " + res.message, "error", "tableMessage");
                        }
                    } catch (e) {
                        showMessage("Kesalahan koneksi jaringan", "error", "tableMessage");
                    } finally {
                        showLoader(false);
                    }
                };
            }

            const confirmEl = document.getElementById('confirmModal');
            if (confirmEl) {
                const myModal = bootstrap.Modal.getOrCreateInstance(confirmEl);
                myModal.show();
            }
        } catch (e) {
            console.error("Delete Error:", e);
        }
    }

    /************************************
     * Kirim data untuk disimpan di sheet
    ************************************/
    async function kirimData(payload) {
    try {
        const resp = await fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: JSON.stringify(payload) 
        });
        const res = await resp.json();
        
        if (res.success) {
            showMessage("Data berhasil disimpan!", "success", "formMessage");
            setTimeout(() => {
                modalInstance.hide();
                loadData();
            }, 1500);
        } else {
            showMessage("Gagal: " + res.message, "error", "formMessage");
            const btn = document.getElementById('btnSimpan');
            btn.disabled = false;
            btn.innerHTML = 'Simpan Data';
        }
    } catch (err) {
        showMessage("Kesalahan koneksi", "error", "formMessage");
        const btn = document.getElementById('btnSimpan');
        btn.disabled = false;
        btn.innerHTML = 'Simpan Data';
    }
    }

    // Fungsi Baru untuk Logika Kondisional Poin 2
    function togglePasangan() {
        const jk = document.getElementById('jk').value;
        const statusKawin = document.getElementById('statusKawin').value;
        const divPasangan = document.getElementById('divPasangan');
        const labelPasangan = document.getElementById('labelPasangan');
        
        let show = false;
        if (jk === "Laki-laki") {
            if (statusKawin === "Kawin" || statusKawin === "Duda") {
                labelPasangan.innerText = "Nama Istri";
                show = true;
            }
        } else if (jk === "Perempuan") {
            if (statusKawin === "Kawin" || statusKawin === "Janda") {
                labelPasangan.innerText = "Nama Suami";
                show = true;
            }
        }
        
        divPasangan.style.display = show ? "block" : "none";
        if (!show) document.getElementById('namaPasangan').value = "";
    }

    /*****************************************************************
     * Fungsi Pesan General
     * @param {string} msg - Teks pesan
     * @param {string} type - success, error, warning, info
     * @param {string} elementId - ID element tempat menampilkan pesan
     ******************************************************************/
    function showMessage(msg, type = 'info', elementId = 'formMessage') {
        const el = document.getElementById(elementId);
        if (!el) return;

        // Mapping Ikon
        const icons = {
            success: '✅',
            error: '❌',
            warning: '⚠️',
            info: 'ℹ️'
        };

        el.className = `form-msg msg-${type}`;
        el.innerHTML = `<span>${icons[type] || '•'}</span> <span>${msg}</span>`;
        el.style.display = 'flex';

        // Sembunyikan otomatis dalam 5 detik
        setTimeout(() => {
            el.style.display = 'none';
        }, 5000);
    }

  </script>
